/* ── Password strength scorer ── */
function _passStrength(p){
  if(!p) return 0;
  let s=0;
  if(p.length>=8)  s++;
  if(p.length>=14) s++;
  if(/[A-Z]/.test(p)&&/[a-z]/.test(p)) s++;
  if(/[0-9]/.test(p)) s++;
  if(/[^A-Za-z0-9]/.test(p)) s++;
  return Math.min(4,s);
}

function _passStrengthLabel(n){return['','Weak','Fair','Good','Strong'][n]||''}
function _passStrengthColor(n){return['','#ef4444','#f97316','#eab308','#22c55e'][n]||'var(--surface3)'}

/* ── Password generator ── */
function generatePassword(len=20,sym=true){
  const lc='abcdefghijklmnopqrstuvwxyz';
  const uc='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const digits='0123456789';
  const syms='!@#$%^&*()-_=+[]{}|;:,.<>?';
  let pool=lc+uc+digits+(sym?syms:'');
  let pass='';
  const arr=new Uint32Array(len);
  crypto.getRandomValues(arr);
  for(let i=0;i<len;i++) pass+=pool[arr[i]%pool.length];
  // Guarantee at least one of each category
  const cats=[lc,uc,digits,sym?syms:null].filter(Boolean);
  const patched=pass.split('');
  cats.forEach((cat,i)=>{
    const idx=new Uint32Array(1); crypto.getRandomValues(idx);
    patched[i]=cat[idx[0]%cat.length];
  });
  // Shuffle
  for(let i=patched.length-1;i>0;i--){
    const j=new Uint32Array(1); crypto.getRandomValues(j);
    [patched[i],patched[j[0]%(i+1)]]=[patched[j[0]%(i+1)],patched[i]];
  }
  return patched.join('');
}

/* ── Favicon helper ── */
function _faviconUrl(site){
  if(!site) return null;
  let host=site.trim();
  if(!/^https?:\/\//i.test(host)) host='https://'+host;
  try{ return 'https://www.google.com/s2/favicons?sz=64&domain='+new URL(host).hostname; }
  catch(e){ return null; }
}

function _faviconHtml(site,label){
  const url=_faviconUrl(site);
  const letter=(label||site||'?')[0].toUpperCase();
  if(url) return `<img src="${url}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt=""><span style="display:none;width:100%;height:100%;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--accent)">${letter}</span>`;
  return `<span style="font-size:14px;font-weight:700">${letter}</span>`;
}

/* ── Copy with auto-clear ── */
function _vaultCopy(text, btn, label='Copied!'){
  navigator.clipboard.writeText(text).then(()=>{
    const orig=btn.innerHTML;
    btn.innerHTML=`<span class="ms">check</span> ${label}`;
    btn.style.background='rgba(34,197,94,.15)';btn.style.color='#22c55e';btn.style.borderColor='rgba(34,197,94,.3)';
    clearTimeout(_vaultClipTimer);
    _vaultClipTimer=setTimeout(()=>{
      navigator.clipboard.writeText('').catch(()=>{});
      btn.innerHTML=orig;btn.style.background='';btn.style.color='';btn.style.borderColor='';
    },30000);
  }).catch(()=>toast('Clipboard access denied','error'));
}

function renderVault(filter=''){
  _vaultInit();
  const list=document.getElementById('vault-list');
  if(!list) return;

  if(!_cryptoKey){
    list.innerHTML=`<div class="vault-enc-gate">
      <span class="ms">lock</span>
      <h3>Vault Locked</h3>
      <p>Enable & unlock encryption in Settings to use the Password Vault. Your passwords are always encrypted at rest.</p>
      <button class="btn primary" onclick="openSettings();setNavActive('nav-settings')"><span class="ms">settings</span> Open Settings</button>
    </div>`;
    document.getElementById('vault-fab').classList.remove('open');
    return;
  }

  const q=filter.toLowerCase();
  const items=(S.passwords||[]).filter(p=>{
    if(!q) return true;
    return (p.site||'').toLowerCase().includes(q)
      ||(p.user||'').toLowerCase().includes(q)
      ||(p.label||'').toLowerCase().includes(q)
      ||(p.bankName||'').toLowerCase().includes(q)
      ||(p.cardHolder||'').toLowerCase().includes(q);
  });

  if(!items.length){
    list.innerHTML=`<div class="vault-empty"><span class="ms">key_off</span><p>${q?'No results for "'+q+'"':'No entries yet.<br>Tap + to add your first.'}</p></div>`;
    document.getElementById('vault-fab').classList.add('open');
    return;
  }

  document.getElementById('vault-fab').classList.add('open');
  list.innerHTML=items.map(_vaultCardHTML).join('');
}

function vTogglePass(id){
  const el=document.getElementById('vp-'+id);

  if(el.textContent==='••••••••••••'||el.textContent.startsWith('•')){
    el.textContent=p.pass;
    btn.innerHTML=`<span class="ms">visibility_off</span> Hide`;
  } else {
    el.textContent='••••••••••••';
    btn.innerHTML=`<span class="ms">visibility</span> Show`;
  }
}

function vCopyPass(id){
  const p=S.passwords.find(x=>x.id===id);

  const btn=document.getElementById('vcopy-'+id);
  _vaultCopy(p.pass,btn,'Copied!');

      <div class="form-group">
        <label class="form-label">Card Number</label>
        <input class="form-input" id="vm-cardnum" placeholder="1234 5678 9012 3456" value="${p.cardNum||''}" autocomplete="off" inputmode="numeric" maxlength="23">
      </div>
      <div style="display:flex;gap:10px">
        <div class="form-group" style="flex:1">
          <label class="form-label">Expiry (MM/YY)</label>
          <input class="form-input" id="vm-expiry" placeholder="08/28" value="${p.expiry||''}" autocomplete="off" maxlength="5">
        </div>
        <div class="form-group" style="flex:1">
          <label class="form-label">CVV</label>
          <input class="form-input" id="vm-cvv" placeholder="123" value="${p.cvv||''}" autocomplete="off" inputmode="numeric" maxlength="4">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">PIN (optional)</label>
        <input class="form-input" id="vm-pin" placeholder="••••" value="${p.pin||''}" autocomplete="off" inputmode="numeric" maxlength="8">
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-input" id="vm-notes" rows="2" placeholder="Billing address, rewards info…" style="resize:vertical">${p.notes||''}</textarea>
      </div>`;

    if(t==='bank') return`
      <div class="form-group">
        <label class="form-label">Bank Name *</label>
        <input class="form-input" id="vm-bankname" placeholder="Chase, Barclays, Wells Fargo…" value="${p.bankName||''}" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">App / Website URL</label>
        <input class="form-input" id="vm-url" placeholder="https://chase.com" value="${p.url||''}" type="url" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Username / Email</label>
        <input class="form-input" id="vm-user" placeholder="you@email.com" value="${p.user||''}" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Password *</label>
        <div style="position:relative">
          <input class="form-input" id="vm-pass" type="password" value="${p.pass||''}" autocomplete="new-password" style="padding-right:44px;font-family:monospace">
          <button type="button" id="vm-vis" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;padding:4px"><span class="ms">visibility</span></button>
        </div>
        <div class="vault-strength-row" style="margin-top:6px">${[0,1,2,3].map(i=>`<div class="vault-strength-seg" id="vm-ss${i}"></div>`).join('')}</div>
      </div>
      <div class="form-group">
        <label class="form-label">Account Number (optional)</label>
        <input class="form-input" id="vm-accountnum" placeholder="000123456789" value="${p.accountNum||''}" autocomplete="off" inputmode="numeric">
      </div>
      <div class="form-group">
        <label class="form-label">Sort Code / Routing (optional)</label>
        <input class="form-input" id="vm-routing" placeholder="12-34-56" value="${p.routingNum||''}" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-input" id="vm-notes" rows="2" placeholder="Branch, SWIFT, IBAN…" style="resize:vertical">${p.notes||''}</textarea>
      </div>`;

    if(t==='basic') return`
      <div class="form-group">
        <label class="form-label">Label *</label>
        <input class="form-input" id="vm-label" placeholder="WiFi password, Netflix PIN…" value="${p.label||''}" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Password *</label>
        <div style="position:relative">
          <input class="form-input" id="vm-pass" type="password" value="${p.pass||''}" autocomplete="new-password" style="padding-right:44px;font-family:monospace">
          <button type="button" id="vm-vis" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;padding:4px"><span class="ms">visibility</span></button>
        </div>
        <div class="vault-strength-row" style="margin-top:6px">${[0,1,2,3].map(i=>`<div class="vault-strength-seg" id="vm-ss${i}"></div>`).join('')}</div>
      </div>
      <div class="pass-gen-row">
        <input type="range" id="vm-gen-len" min="8" max="64" value="${p.pass?p.pass.length:20}" style="flex:1;accent-color:var(--accent)">
        <span id="vm-gen-len-val" style="font-size:12px;color:var(--text2);min-width:24px;text-align:center">${p.pass?p.pass.length:20}</span>
        <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text2);cursor:pointer"><input type="checkbox" id="vm-gen-sym" checked style="accent-color:var(--accent)"> Sym</label>
        <button class="vault-copy-btn" id="vm-gen-btn"><span class="ms">refresh</span> Gen</button>
      </div>
      <div class="form-group" style="margin-top:14px">
        <label class="form-label">Notes (optional)</label>
        <textarea class="form-input" id="vm-notes" rows="2" placeholder="Hint, context…" style="resize:vertical">${p.notes||''}</textarea>
      </div>`;

    // default: password
    const ip=p.pass||initPass;
    return`
      <div class="form-group">
        <label class="form-label">Site / Service *</label>
        <input class="form-input" id="vm-site" placeholder="google.com" value="${p.site||''}" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Label (optional)</label>
        <input class="form-input" id="vm-label" placeholder="Personal Gmail" value="${p.label||''}" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">URL (optional)</label>
        <input class="form-input" id="vm-url" placeholder="https://accounts.google.com" value="${p.url||''}" type="url" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Username / Email</label>
        <input class="form-input" id="vm-user" placeholder="you@email.com" value="${p.user||''}" autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Password *</label>
        <div style="position:relative">
          <input class="form-input" id="vm-pass" type="password" value="${ip}" autocomplete="new-password" style="padding-right:44px;font-family:monospace">
          <button type="button" id="vm-vis" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;padding:4px"><span class="ms">visibility</span></button>
        </div>
        <div class="vault-strength-row" style="margin-top:6px">${[0,1,2,3].map(i=>`<div class="vault-strength-seg" id="vm-ss${i}"></div>`).join('')}</div>
      </div>
      <div class="pass-gen-row">
        <input type="range" id="vm-gen-len" min="8" max="64" value="20" style="flex:1;accent-color:var(--accent)">
        <span id="vm-gen-len-val" style="font-size:12px;color:var(--text2);min-width:24px;text-align:center">20</span>
        <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text2);cursor:pointer"><input type="checkbox" id="vm-gen-sym" checked style="accent-color:var(--accent)"> Sym</label>
        <button class="vault-copy-btn" id="vm-gen-btn"><span class="ms">refresh</span> Gen</button>
      </div>
      <div class="form-group" style="margin-top:14px">
        <label class="form-label">Notes</label>
        <textarea class="form-input" id="vm-notes" rows="2" placeholder="Security Q, backup codes…" style="resize:vertical">${p.notes||''}</textarea>
      </div>`;
  }

  function buildModal(t){
    openModal(`
      <div class="modal-head">
        <button class="ibtn" id="vm-cancel"><span class="ms">close</span></button>
        <h2>${isEdit?'Edit Entry':'Add Entry'}</h2>
        <button class="ibtn accent" id="vm-save"><span class="ms">check</span></button>
      </div>
      <div class="modal-body" style="padding:16px 18px 24px">
        <div class="vault-type-chips" id="vm-type-chips">
          ${['password','bank','card','basic'].map(x=>`
            <button class="vault-type-chip${t===x?' active':''}" data-vtype="${x}">
              <span class="ms">${_vaultTypeIcon(x)}</span>${_vaultTypeLabel(x)}
            </button>`).join('')}
        </div>
        <div id="vm-fields">${typeFields(t)}</div>
      </div>`,
    'modal modal-sm');

    // type chip switching
    document.querySelectorAll('[data-vtype]').forEach(btn=>{
      btn.addEventListener('click',()=>{
        currentType=btn.dataset.vtype;
        // snapshot current values before rebuild
        _snapshotVmFields(p, currentType==='password'&&p.type!=='password'?'old':p.type);
        buildModal(currentType);
      });
    });

    _bindVmFields(t,p,isEdit);
  }

  buildModal(currentType);
}

function _snapshotVmFields(p, prevType){
  // save whatever is currently in the form before type switch
  const get=id=>(document.getElementById(id)||{}).value||'';
  p.notes=get('vm-notes');
  p.label=get('vm-label');
  p.url=get('vm-url');
  p.user=get('vm-user');
  p.pass=get('vm-pass')||p.pass;
  p.site=get('vm-site');
  p.bankName=get('vm-bankname');
  p.cardHolder=get('vm-cardholder');
  p.cardNum=get('vm-cardnum');
  p.expiry=get('vm-expiry');
  p.cvv=get('vm-cvv');
  p.pin=get('vm-pin');
  p.accountNum=get('vm-accountnum');
  p.routingNum=get('vm-routing');
  if(document.getElementById('vm-card-type')) p.cardType=document.getElementById('vm-card-type').value;
}

function _bindVmFields(t,p,isEdit){
  function updateStrength(){
    const passEl=document.getElementById('vm-pass');
    if(!passEl) return;
    const s=_passStrength(passEl.value);
    [0,1,2,3].forEach(i=>{
      const el=document.getElementById('vm-ss'+i);
      if(el) el.style.background=i<s?_passStrengthColor(s):'var(--surface3)';
    });
  }
  updateStrength();
  document.getElementById('vm-pass')?.addEventListener('input',updateStrength);

  document.getElementById('vm-vis')?.addEventListener('click',()=>{
    const inp=document.getElementById('vm-pass');
    inp.type=inp.type==='password'?'text':'password';
    document.getElementById('vm-vis').querySelector('.ms').textContent=inp.type==='password'?'visibility':'visibility_off';
  });

  const lenSlider=document.getElementById('vm-gen-len');
  const lenVal=document.getElementById('vm-gen-len-val');
  if(lenSlider){ lenSlider.addEventListener('input',()=>{ lenVal.textContent=lenSlider.value; }); }

  document.getElementById('vm-gen-btn')?.addEventListener('click',()=>{
    const len=parseInt(lenSlider.value)||20;
    const sym=document.getElementById('vm-gen-sym').checked;
    const np=generatePassword(len,sym);
    const inp=document.getElementById('vm-pass');
    inp.value=np; inp.type='text';
    document.getElementById('vm-vis').querySelector('.ms').textContent='visibility_off';
    updateStrength();
  });

  // Card number formatting
  document.getElementById('vm-cardnum')?.addEventListener('input',e=>{
    let v=e.target.value.replace(/\D/g,'').slice(0,16);
    e.target.value=v.replace(/(.{4})/g,'$1 ').trim();
  });
  // Expiry formatting
  document.getElementById('vm-expiry')?.addEventListener('input',e=>{
    let v=e.target.value.replace(/\D/g,'');
    if(v.length>=2) v=v.slice(0,2)+'/'+v.slice(2,4);
    e.target.value=v;
  });

  document.getElementById('vm-cancel').addEventListener('click',closeModal);
  document.getElementById('vm-save').addEventListener('click',()=>{
    _snapshotVmFields(p, t);
    p.type=t;

    // Validation per type
    if(t==='card'){
      if(!p.label){ toast('Card label required','error'); return; }
      p.cardType=document.getElementById('vm-card-type')?.value||'credit';
    } else if(t==='bank'){
      if(!p.bankName){ toast('Bank name required','error'); return; }
      if(!p.pass){ toast('Password required','error'); return; }
    } else if(t==='basic'){
      if(!p.label){ toast('Label required','error'); return; }
      if(!p.pass){ toast('Password required','error'); return; }
    } else {
      if(!p.site){ toast('Site required','error'); document.getElementById('vm-site')?.focus(); return; }
      if(!p.pass){ toast('Password required','error'); return; }
    }

    p.updatedAt=Date.now();
    if(!isEdit){
      p.createdAt=Date.now();
      if(!S.passwords) S.passwords=[];
      S.passwords.unshift(p);
    }
    saveS();
    closeModal();
    renderVault(document.getElementById('vault-search')?.value||'');
    toast(isEdit?'Entry updated':'Entry saved','success');
  });

  // Focus first field
  setTimeout(()=>{
    const first=document.querySelector('#vm-fields .form-input');
    if(first) first.focus();
  },120);
}

/* ── Open vault view ── */
function openVault(){
  _vaultInit();
  document.getElementById('vault-view').classList.add('open');
  document.getElementById('vault-fab').classList.add('open');
  document.getElementById('day-panel').classList.remove('open','expanded');
  document.getElementById('vault-search').value='';
  renderVault('');
  _vaultOpen=true;

  document.getElementById('vault-search').oninput=function(){ renderVault(this.value); };
  document.getElementById('vault-fab').onclick=()=>openVaultModal();
  document.getElementById('vault-lock-btn').onclick=()=>{
    if(!_cryptoKey){ toast('Vault already locked','info'); return; }
    // Clear key and reload page to full lock state
    location.reload();
  };
}

function closeVault(){
  document.getElementById('vault-view').classList.remove('open');
  document.getElementById('vault-fab').classList.remove('open');
  _vaultOpen=false;
}

async function init(){
  // Load settings plaintext first (needed for applySettings before unlock)
  const hasEncVault = await loadS();
  applySettings();
  document.fonts.ready.then(positionCircles);
  window.addEventListener('resize',positionCircles);
  setupEvents();
  renderCalendar();

  // ── Encryption gate (real security) ─────────
  if(hasEncVault){
    // Encrypted vault exists → must unlock before any data is accessible
    await showEncLockScreen('unlock');
    // If user somehow skipped, S stays empty — that's correct (no data exposed)
  } else {
    const hasLegacy = !!localStorage.getItem(LEG_STORE);
    // First run or legacy: offer encryption setup (skippable)
    if(hasLegacy && !localStorage.getItem(SET_STORE+'_enc_declined')){
      // Offer once to migrate legacy data to encrypted vault
      const accepted = await showEncLockScreen('migrate');
      if(!accepted){ localStorage.setItem(SET_STORE+'_enc_declined','1'); }
    }
  }

  // Re-render calendar now that data is loaded
  renderCalendar();
}
init();
</script>
