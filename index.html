function renderDayPanel(){
  if(!S.selectedDate)return;
  document.getElementById('day-panel-title').textContent=fmtDate(S.selectedDate);
  const items=getItemsForDate(S.selectedDate);
  const cont=document.getElementById('day-items');
  if(!items.length){
    cont.innerHTML=`<div class="empty-state"><span class="ms">calendar_today</span><p>Nothing here yet.<br>Tap a button above to create.</p></div>`;
    return;
  }
  cont.innerHTML=items.map(it=>itemCard(it)).join('');
  // Stagger item card animations
  cont.querySelectorAll('.item-card').forEach((el,i)=>{
    el.style.animationDelay=`${i*55}ms`;
  });
  cont.querySelectorAll('[data-action]').forEach(btn=>{
    btn.addEventListener('click',e=>{e.stopPropagation();handleItemAction(btn.dataset.action,btn.dataset.type,btn.dataset.id)});
  });
  cont.querySelectorAll('.item-card').forEach(el=>{
    let lpTimer;
    function startLP(){lpTimer=setTimeout(()=>{
      document.querySelectorAll('.item-card').forEach(c=>c.classList.remove('lp-active'));
      el.classList.add('lp-active');
    },500);}
    function stopLP(){clearTimeout(lpTimer);}
    el.addEventListener('mousedown',startLP);
    el.addEventListener('mouseup',stopLP);
    el.addEventListener('mouseleave',stopLP);
    el.addEventListener('touchstart',startLP,{passive:true});
    el.addEventListener('touchend',stopLP);
    el.addEventListener('click',e=>{
      if(e.target.closest('[data-action]'))return;
      if(el.classList.contains('lp-active')){el.classList.remove('lp-active');return;}
      openEditor(el.dataset.type,el.dataset.id);
    });
  });
}

function typeIcon(type){return type==='note'?'note':type==='todo'?'checklist':'table_chart'}
function typeName(type){return type==='note'?'Note':type==='todo'?'To-Do':'Table'}

function itemCard(it){
  const f=getFolderById(it.folderId);
  const col=f?f.color:S.settings.accent;
  const fname=f?f.name:'No folder';
  const ts=new Date(it.createdAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  return`<div class="item-card" data-type="${it.type}" data-id="${it.id}" style="--folder-color:${col}">
    <div class="item-card-top">
      <div class="item-type-icon"><span class="ms">${typeIcon(it.type)}</span></div>
      <span class="item-title">${it.title||'Untitled'}</span>
      <span class="item-folder-tag"><span class="ms" style="font-size:13px;color:${col}">folder</span>${fname}</span>
    </div>
    <div class="item-meta">
      <span>${ts}</span>
      ${it.type==='todo'?`<span class="chip">${it.items?it.items.filter(i=>i.done).length:0}/${it.items?it.items.length:0}</span>`:''}
    </div>
    <div class="item-actions">
      <button class="act-btn" data-action="edit" data-type="${it.type}" data-id="${it.id}" title="Edit"><span class="ms">edit</span></button>
      <button class="act-btn" data-action="duplicate" data-type="${it.type}" data-id="${it.id}" title="Duplicate"><span class="ms">content_copy</span></button>
      <div class="act-sep"></div>
      <button class="act-btn" data-action="move" data-type="${it.type}" data-id="${it.id}" title="Move to folder"><span class="ms">drive_file_move</span></button>
      <button class="act-btn" data-action="download" data-type="${it.type}" data-id="${it.id}" title="Download"><span class="ms">download</span></button>
      <button class="act-btn red" data-action="delete" data-type="${it.type}" data-id="${it.id}" title="Delete"><span class="ms">delete</span></button>
    </div>
  </div>`;
}

function handleItemAction(action,type,id){
  if(action==='edit'){openEditor(type,id);return}
  if(action==='duplicate'){duplicateItem(type,id);return}
  if(action==='delete'){deleteItem(type,id);return}
  if(action==='share'){openExportMenu(type,id,'share');return}
  if(action==='download'){openExportMenu(type,id,'download');return}
  if(action==='move'){openMoveItemModal(type,id,renderDayPanel);return}
}

function openMoveItemModal(type,id,onDone){
  if(!S.folders.length){toast('No folders to move to','error');return;}
  const arr=type==='note'?S.notes:type==='todo'?S.todos:S.tables;
  const item=arr.find(i=>i.id===id);
  if(!item)return;
  openModal(`
    <div class="modal-head">
      <button class="ibtn" id="mv-cancel"><span class="ms">close</span></button>
      <h2>Move to Folder</h2>
    </div>
    <div class="modal-body" style="padding:10px">
      ${S.folders.map(f=>`<div class="folder-item-row" data-mv-fid="${f.id}" style="cursor:pointer;${f.id===item.folderId?'border-color:var(--accent);background:var(--accent-soft)':''}">
        <div style="width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:${f.color}20;flex-shrink:0"><span class="ms" style="color:${f.color}">folder</span></div>
        <div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600">${f.name}</div><div style="font-size:11px;color:var(--text3)">${getFolderItemCount(f.id)} items</div></div>
        ${f.id===item.folderId?`<span class="ms" style="color:var(--accent)">check_circle</span>`:''}
      </div>`).join('')}
    </div>`,
  'modal modal-sm');
  document.getElementById('mv-cancel').addEventListener('click',closeModal);
  document.querySelectorAll('[data-mv-fid]').forEach(row=>{
    row.addEventListener('click',()=>{
      item.folderId=row.dataset.mvFid;
      saveS();renderCalendar();
      toast('Moved to '+S.folders.find(f=>f.id===item.folderId)?.name,'success');
      overlay.classList.remove('show');modalRoot.innerHTML='';
      if(onDone)requestAnimationFrame(onDone);
    });
  });
}

/* ═══════════════════════════════════════════════
   OVERLAY SYSTEM
═══════════════════════════════════════════════ */
const overlay=document.getElementById('overlay');
const modalRoot=document.getElementById('modal-root');
let currentDropdown=null;
let _navCloseTimer=null;

function _hideNav(){document.getElementById('bottom-nav').style.display='none';}
function _showNav(){document.getElementById('bottom-nav').style.display='';}

function openModal(html,cls='modal modal-sm'){
  // Cancel any pending nav-restore from a previous closeModal animation
  clearTimeout(_navCloseTimer);_navCloseTimer=null;
  modalRoot.innerHTML=`<div class="${cls}">${html}</div>`;
  overlay.classList.add('show');
  if(cls.includes('modal-full')){
    _hideNav();
  }
}
function closeModal(){
  // Clean up body-mounted note editor align menu
  window._alignMenuCleanup?.();
  window._alignMenuCleanup=null;
  const m=modalRoot.querySelector('.modal');
  if(m){
    m.classList.add('closing');
    _navCloseTimer=setTimeout(()=>{
      _navCloseTimer=null;
      overlay.classList.remove('show');
      modalRoot.innerHTML='';
      _showNav();
    },170);
  }else{
    overlay.classList.remove('show');
    modalRoot.innerHTML='';
    _showNav();
  }
}
overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal()});

function closeDropdown(){if(currentDropdown){currentDropdown.remove();currentDropdown=null;}}
function openExportMenu(type,id,mode,anchorEl,tableDataArg){
  closeDropdown();
  const canXlsx=type==='table';
  const itemLabel=mode==='share'?'Share':'Download';
  const sel=document.createElement('select');
  sel.size=canXlsx?4:3;
  sel.style.cssText='position:fixed;z-index:99999;background:var(--surface2);color:var(--text);border:1px solid var(--border2);border-radius:var(--r);font-family:var(--ui-font);font-size:14px;padding:4px;min-width:200px;box-shadow:0 10px 40px var(--shadow);outline:none;';
  sel.innerHTML=`<option value="text">${itemLabel} as Text</option><option value="image">${itemLabel} as Image</option><option value="pdf">${itemLabel} as PDF</option>${canXlsx?`<option value="xlsx">${itemLabel} as Spreadsheet</option>`:''}`;
  const anchor=anchorEl||document.getElementById('btn-folders')||document.body;
  const rect=anchor.getBoundingClientRect();
  const top=rect.bottom+4;
  sel.style.top=Math.min(top,window.innerHeight-180)+'px';
  sel.style.left='8px';
  sel.style.right='8px';
  document.body.appendChild(sel);
  currentDropdown=sel;
  sel.addEventListener('change',()=>{
    const fmt=sel.value;
    closeDropdown();
    if(fmt==='text')exportText(type,id,mode);
    else if(fmt==='image')exportImage(type,id,mode);
    else if(fmt==='pdf')exportPDF(type,id,mode);
    else if(fmt==='xlsx')exportXLSX(type,id,tableDataArg);
  });
  setTimeout(()=>document.addEventListener('pointerdown',e=>{if(!sel.contains(e.target))closeDropdown();},{once:true}),10);
}

function openFolderModal(existingId, returnFn){
  const existing=existingId?S.folders.find(f=>f.id===existingId):null;
  const selColor=existing?existing.color:FOLDER_COLORS[0];
  const swatches=FOLDER_COLORS.map(c=>`<div class="color-swatch${c===selColor?' active':''}" data-color="${c}" style="background:${c}"></div>`).join('');
  openModal(`
    <div class="modal-head">
      <button class="ibtn" id="m-cancel"><span class="ms">${returnFn?'arrow_back':'close'}</span></button>
      <h2>${existing?'Edit Folder':'New Folder'}</h2>
      <button class="ibtn accent" id="m-save"><span class="ms">check</span></button>
    </div>
    <div class="modal-body">
      <div class="folder-preview">
        <div class="folder-icon-preview" id="folder-prev" style="background:${selColor}20">
          <span class="ms" style="color:${selColor}">folder</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Folder Name</label>
        <input class="form-input" id="folder-name" placeholder="My Folder" value="${existing?existing.name:''}">
      </div>
      <div class="form-group">
        <label class="form-label">Color</label>
        <div class="color-swatches" id="color-swatches">
          ${swatches}
          <div class="color-swatch color-custom" title="Custom color">
            <span class="ms">colors</span>
            <input type="color" id="folder-custom-color" value="${selColor}">
          </div>
        </div>
      </div>
    </div>`,
  'modal modal-sm');

  let chosenColor=selColor;
  function setColor(c){
    chosenColor=c;
    document.getElementById('folder-prev').style.background=c+'20';
    document.getElementById('folder-prev').querySelector('.ms').style.color=c;
    document.querySelectorAll('#color-swatches .color-swatch').forEach(s=>{
      s.classList.toggle('active',s.dataset.color===c||(!s.dataset.color&&c===document.getElementById('folder-custom-color')?.value));
    });
  }
  document.querySelectorAll('#color-swatches .color-swatch[data-color]').forEach(s=>{
    s.addEventListener('click',()=>setColor(s.dataset.color));
  });
  document.getElementById('folder-custom-color').addEventListener('input',e=>setColor(e.target.value));
  document.getElementById('m-cancel').addEventListener('click',()=>{
    if(returnFn){overlay.classList.remove('show');modalRoot.innerHTML='';requestAnimationFrame(returnFn);}
    else closeModal();
  });
  document.getElementById('m-save').addEventListener('click',()=>{
    const name=document.getElementById('folder-name').value.trim()||'Untitled Folder';
    if(existing){existing.name=name;existing.color=chosenColor;}
    else{S.folders.push({id:uid(),name,color:chosenColor,createdAt:Date.now()});}
    saveS();renderDayPanel();toast('Folder saved','success');
    if(returnFn){overlay.classList.remove('show');modalRoot.innerHTML='';requestAnimationFrame(returnFn);}
    else closeModal();
  });
  document.getElementById('folder-name').focus();
}

function folderSelect(selId){
  const opts=S.folders.map(f=>`<option value="${f.id}"${f.id===selId?' selected':''}>${f.name}</option>`).join('');
  const noFolders=!S.folders.length?`<option value="">— No folders yet —</option>`:'';
  return noFolders+opts+`<option value="__new__">+ New Folder</option>`;
}
function checkFolders(){
  if(!S.folders.length){
    if(confirm('No folders yet. Create a folder first?'))openFolderModal();
    return false;

  return true;
}

    if(sel&&sel.rangeCount)savedRange=sel.getRangeAt(0).cloneRange();

    hlPicker.className='hl-picker';
    HL_COLORS.forEach((col,i)=>{
      const sw=document.createElement('div');
      sw.className='hl-swatch'+(col==='transparent'?' remove':'');
      if(col!=='transparent')sw.style.background=col;
      sw.title=HL_LABELS[i];
      if(col==='transparent')sw.textContent='✕';
      sw.addEventListener('mousedown',ev=>{ev.preventDefault();});
      sw.addEventListener('click',ev=>{
        ev.preventDefault();ev.stopPropagation();
        // Restore selection
        if(savedRange){
          sel.removeAllRanges();sel.addRange(savedRange);
        }
        if(col==='transparent'){
          // Remove highlight: try multiple approaches
          document.execCommand('hiliteColor',false,'transparent');
          // Also strip inline background-color from spans in selection
          if(savedRange){
            const frag=savedRange.cloneContents();
            const spans=frag.querySelectorAll('[style*="background-color"]');
            if(spans.length===0){
              // Selection might be inside a highlight span — unwrap it
              const anc=savedRange.commonAncestorContainer;
              const el=anc.nodeType===3?anc.parentElement:anc;
              const hlEl=el.closest('[style*="background-color"]');
              if(hlEl){hlEl.style.backgroundColor='';if(!hlEl.getAttribute('style'))hlEl.removeAttribute('style');}
            }
          }
        }else{
          document.execCommand('hiliteColor',false,col);
        }
        area.focus();closeHlPicker();
      });
      hlPicker.appendChild(sw);
    });
    const rect=hlBtn.getBoundingClientRect();
    hlPicker.style.position='fixed';
    hlPicker.style.top=(rect.bottom+4)+'px';
    hlPicker.style.left=Math.max(8,rect.left-60)+'px';
    document.body.appendChild(hlPicker);
    setTimeout(()=>document.addEventListener('click',closeHlPicker,{once:true}),0);
  });

  document.getElementById('ne-text-color').addEventListener('input',e=>{
    document.execCommand('foreColor',false,e.target.value);area.focus();
  });
  document.getElementById('ne-bg-sel').addEventListener('change',e=>{
    const bgId=e.target.value;
    area.className='note-area note-bg-'+bgId;
    if(bgId==='custom'){document.getElementById('ne-bg-file').click();}
    else{area.style.backgroundImage='';noteCustomBg='';}
  });
  document.getElementById('ne-bg-color').addEventListener('input',e=>{
    area.style.backgroundColor=e.target.value;
    syncPinSlotBg();
  });
  document.getElementById('ne-bg-file').addEventListener('change',e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{noteCustomBg=ev.target.result;area.style.backgroundImage=`url(${noteCustomBg})`;area.style.backgroundSize='cover';};
    reader.readAsDataURL(file);
  });

  // ── Font family select ───────────────────────────
  const fontSel=document.getElementById('ne-font-sel');
  // Reflect current font in dropdown display
  fontSel.style.fontFamily=`'${curFont}',sans-serif`;
  fontSel.addEventListener('change',e=>{
    fontSel.style.fontFamily=`'${e.target.value}',sans-serif`;
    area.style.fontFamily=`'${e.target.value}',sans-serif`;
    const pm=getPinMarker();
    if(pm){const dd=pm.querySelector('div[style*="position:absolute"]');if(dd)dd.style.fontFamily=`'${e.target.value}',sans-serif`;}
  });

  // ── Font size select ─────────────────────────────
  document.getElementById('ne-font-size').addEventListener('change',e=>{
    const size=e.target.value+'px';
    const sel=window.getSelection();
    if(sel&&sel.rangeCount&&!sel.getRangeAt(0).collapsed){
      // Wrap selection
      const range=sel.getRangeAt(0);
      const span=document.createElement('span');
      span.style.fontSize=size;
      try{range.surroundContents(span);}
      catch(err){
        const frag=range.extractContents();
        span.appendChild(frag);range.insertNode(span);
      }
    }else{
      area.style.fontSize=size;
    }
    area.focus();
  });

  // ── Pin toggle ───────────────────────────────────
  function ordSuffix(d){return d+(d>=11&&d<=13?'th':d%10===1?'st':d%10===2?'nd':d%10===3?'rd':'th')}
  function pinMarkerHTML(){
    const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const MONS=['January','February','March','April','May','June','July','August','September','October','November','December'];
    const ref=S.selectedDate||today();
    const [y,m,d]=ref.split('-').map(Number);
    const dt=new Date(y,m-1,d);
    const now=new Date();
    let h=now.getHours(),mi=now.getMinutes(),ampm=h>=12?'PM':'AM';
    h=h%12||12;
    const timeStr=`${String(h).padStart(2,'0')}:${String(mi).padStart(2,'0')} ${ampm}`;
    const dateStr=`${d} ${MONS[m-1]}, ${y}`;
    const dayTime=`${DAYS[dt.getDay()]}, ${timeStr}`;
    return `<div class="note-pin-marker" data-pin="1" style="padding:7px 36px 0px 22px; margin-bottom: -1.8vh; line-height:1.5;user-select:none;pointer-events:none;"><div style="text-align:right;font-family:'${fontSel.value||curFont}',sans-serif;line-height:1.5;"><div style="font-size:13px;font-weight:700;letter-spacing:-.2px;">${dateStr}</div><div style="font-size:11px;opacity:0.7;">${dayTime}</div></div></div>`;
  }
  function getPinMarker(){return pinSlot.querySelector('[data-pin="1"]');}
  function insertPinMarker(){if(!getPinMarker()){pinSlot.innerHTML=pinMarkerHTML();syncPinSlotBg();}}
  function removePinMarker(){pinSlot.innerHTML='';}
  if(curPinned)insertPinMarker();

    document.getElementById('ne-clear').addEventListener('click',()=>{
    if(confirm('Clear all note content?')){area.innerHTML='';area.focus();}
  });

  // ── Focus / distraction-free mode ───────────────
  let _focusSnapshot='';
  const _focusLayout=document.querySelector('.editor-layout');
  document.getElementById('ne-focus-fab').addEventListener('click',()=>{
    _focusSnapshot=area.innerHTML;
    _focusLayout.classList.add('focus-mode');
    // Do NOT call area.focus() — keep keyboard hidden until user taps the editor
    area.blur();
  });
  document.getElementById('ne-focus-cancel').addEventListener('click',()=>{
    area.innerHTML=_focusSnapshot;
    _focusLayout.classList.remove('focus-mode');
    area.focus();
  });
  document.getElementById('ne-focus-save').addEventListener('click',()=>{
    // Persist changes without closing the editor
    const folderId=document.getElementById('ne-folder').value;
    if(!folderId){toast('Select a folder','error');return;}
    const title=document.getElementById('ne-title').value.trim()||'Untitled Note';
    const clone=area.cloneNode(true);
    clone.querySelectorAll('[data-pin="1"]').forEach(m=>m.remove());
    const content=clone.innerHTML;
    const bgSel=document.getElementById('ne-bg-sel').value||'plain';
    const noteFont=document.getElementById('ne-font-sel').value||'Comfortaa';
    const fontSize=parseInt(document.getElementById('ne-font-size').value)||20;
    const bgColor=document.getElementById('ne-bg-color').value||'#faf8f4';
    const pinned=document.getElementById('ne-pin').classList.contains('active');
    if(note){
      note.title=title;note.content=content;note.folderId=folderId;note.bg=bgSel;note.noteFont=noteFont;note.bgColor=bgColor;note.fontSize=fontSize;note.pinned=pinned;
      if(noteCustomBg)note.customBg=noteCustomBg;
    }else{
      S.notes.push({id:uid(),folderId,title,content,bg:bgSel,noteFont,bgColor,fontSize,pinned,customBg:noteCustomBg||'',date:S.selectedDate||today(),createdAt:Date.now()});
    }
    saveS();renderDayPanel();renderCalendar();toast('Note saved','success');
    _focusLayout.classList.remove('focus-mode');
    // Don't auto-focus — let user tap to resume typing
  });

  function saveNote(){
    const folderId=document.getElementById('ne-folder').value;
    if(!folderId){toast('Select a folder','error');return}
    const title=document.getElementById('ne-title').value.trim()||'Untitled Note';
    // Strip pin marker before saving
    const clone=area.cloneNode(true);
    clone.querySelectorAll('[data-pin="1"]').forEach(m=>m.remove());
    const content=clone.innerHTML;
    const bgSel=document.getElementById('ne-bg-sel').value||'plain';
    const noteFont=document.getElementById('ne-font-sel').value||'Comfortaa';
    const fontSize=parseInt(document.getElementById('ne-font-size').value)||20;
    const bgColor=document.getElementById('ne-bg-color').value||'#faf8f4';
    const pinned=document.getElementById('ne-pin').classList.contains('active');
    if(note){
      note.title=title;note.content=content;note.folderId=folderId;note.bg=bgSel;note.noteFont=noteFont;note.bgColor=bgColor;note.fontSize=fontSize;note.pinned=pinned;
      if(noteCustomBg)note.customBg=noteCustomBg;
    }else{
      S.notes.push({id:uid(),folderId,title,content,bg:bgSel,noteFont,bgColor,fontSize,pinned,customBg:noteCustomBg||'',date:S.selectedDate||today(),createdAt:Date.now()});
    }
    saveS();renderDayPanel();renderCalendar();toast('Note saved','success');closeModal();
  }

  document.getElementById('ne-cancel').addEventListener('click',closeModal);
  document.getElementById('ne-save').addEventListener('click',saveNote);

  // Handle "Create new folder" option in folder dropdown
  const neFolderSel=document.getElementById('ne-folder');
  neFolderSel.addEventListener('change',e=>{
    if(e.target.value==='__new__'){
      const prev=neFolderSel.value;
      e.target.value=prev==='__new__'?(S.folders[0]?.id||''):prev;
      const prevFolderId=neFolderSel.value;
      openFolderModal(null,()=>{
        // Rebuild the select after folder creation
        neFolderSel.innerHTML=folderSelect(prevFolderId);
        // Wire new-folder handler again (re-attach since innerHTML replaced)
        neFolderSel.addEventListener('change',newFolderHandler);
        // Auto-select the newly created folder
        const newest=S.folders[S.folders.length-1];
        if(newest) neFolderSel.value=newest.id;
      });
    }
  });
  function newFolderHandler(e){
    if(e.target.value==='__new__'){
      e.target.value=S.folders[0]?.id||'';
      openFolderModal(null,()=>{
        neFolderSel.innerHTML=folderSelect(S.folders[0]?.id);
        const newest=S.folders[S.folders.length-1];
        if(newest) neFolderSel.value=newest.id;
      });
    }
  }
  if(note){
    document.getElementById('ne-del').addEventListener('click',()=>{if(confirm('Delete note?')){deleteItem('note',note.id);closeModal();}});
  }

  // ── Align/list/pin dropdown (body-mounted to escape overflow clipping) ──────
  // Remove any stale menu from a previous editor open (closeModal cleans up, but guard here too)
  document.getElementById('ne-align-menu')?.remove();
  const alignToggle = document.getElementById('ne-align-toggle');
  // Build menu and mount to body
  const alignMenu = document.createElement('div');
  alignMenu.id = 'ne-align-menu';
  alignMenu.style.cssText = `display:none;position:fixed;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);box-shadow:0 8px 28px var(--shadow);padding:6px;z-index:99999;flex-direction:column;gap:2px;min-width:44px`;
  alignMenu.innerHTML = `
    <button class="fmt-btn ne-align-btn" data-align="justifyLeft" title="Align Left"><span class="ms">format_align_left</span></button>
    <button class="fmt-btn ne-align-btn" data-align="justifyCenter" title="Align Center"><span class="ms">format_align_center</span></button>
    <button class="fmt-btn ne-align-btn" data-align="justifyRight" title="Align Right"><span class="ms">format_align_right</span></button>
    <button class="fmt-btn ne-align-btn" data-align="justifyFull" title="Justify"><span class="ms">format_align_justify</span></button>
    <div style="width:100%;height:1px;background:var(--border2);margin:2px 0;flex-shrink:0"></div>
    <button class="fmt-btn" data-cmd="insertUnorderedList" title="Bullets"><span class="ms">format_list_bulleted</span></button>
    <button class="fmt-btn" data-cmd="insertOrderedList" title="Numbered"><span class="ms">format_list_numbered</span></button>`;
  document.body.appendChild(alignMenu);

  // Wire pin button (now in fmt-toolbar, not in alignMenu)
  const pinBtn = document.getElementById('ne-pin');
  if(pinBtn){
    pinBtn.addEventListener('mousedown', e=>e.preventDefault());
    pinBtn.addEventListener('click', e => {
      e.stopPropagation();
      const on = pinBtn.classList.toggle('active');
      on ? insertPinMarker() : removePinMarker();
    });
  }

  // Wire up buttons inside the menu
  alignMenu.querySelectorAll('.ne-align-btn').forEach(btn=>{
    btn.addEventListener('mousedown',e=>e.preventDefault());
    btn.addEventListener('click',()=>{
      document.execCommand(btn.dataset.align,false,null);
      alignMenu.querySelectorAll('.ne-align-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      area.focus();
    });
  });
  alignMenu.querySelectorAll('.fmt-btn[data-cmd]').forEach(btn=>{
    btn.addEventListener('mousedown',e=>e.preventDefault());
    btn.addEventListener('click',()=>{document.execCommand(btn.dataset.cmd,false,null);area.focus();});
  });

  function openAlignMenu(){
    const r = alignToggle.getBoundingClientRect();
    alignMenu.style.display = 'flex';
    // Position below button, right-aligned
    const mw = alignMenu.offsetWidth||50;
    let left = r.right - mw;
    if(left < 4) left = 4;
    alignMenu.style.top = (r.bottom + 4) + 'px';
    alignMenu.style.left = left + 'px';
    alignToggle.classList.add('active');
  }
  function closeAlignMenu(){
    alignMenu.style.display = 'none';
    alignToggle.classList.remove('active');
  }
  alignToggle.addEventListener('mousedown', e => e.preventDefault());
  alignToggle.addEventListener('click', e => {
    e.stopPropagation();
    alignMenu.style.display === 'flex' ? closeAlignMenu() : openAlignMenu();
  });
  document.addEventListener('click', e => {
    if(!alignMenu.contains(e.target) && e.target !== alignToggle) closeAlignMenu();
  });
  // Clean up menu from body when modal closes
  const _origCloseModal = window._alignMenuCleanup;
  window._alignMenuCleanup = () => { alignMenu.remove(); };
  document.getElementById('ne-dl').addEventListener('change',e=>{
    const fmt=e.target.value;
    if(!fmt)return;
    e.target.value='';
    // Sync live editor state so export reflects what user currently sees
    const liveBg=document.getElementById('ne-bg-sel').value||'plain';
    const liveBgColor=document.getElementById('ne-bg-color').value||'#faf8f4';
    const liveFont=document.getElementById('ne-font-sel').value||'Comfortaa';
    const liveFontSize=parseInt(document.getElementById('ne-font-size').value)||14;
    const livePinned=document.getElementById('ne-pin').classList.contains('active');
    const liveContent=document.getElementById('ne-content').innerHTML;
    const liveTitle=document.getElementById('ne-title').value.trim()||'Untitled Note';
    if(note){
      note.bg=liveBg;note.bgColor=liveBgColor;note.noteFont=liveFont;note.fontSize=liveFontSize;note.pinned=livePinned;
      note.content=liveContent;note.title=liveTitle;
      if(noteCustomBg)note.customBg=noteCustomBg;
    }
    if(fmt==='text')exportText('note',note?.id,'download');
    else if(fmt==='image')exportImage('note',note?.id,'download');
    else if(fmt==='pdf')exportPDF('note',note?.id,'download');
  });
}

/* ═══════════════════════════════════════════════
   TODO EDITOR
═══════════════════════════════════════════════ */
function openTodoEditor(id){
  if(!checkFolders()&&!id)return;
  const todo=id?S.todos.find(t=>t.id===id):null;
  const items=todo?JSON.parse(JSON.stringify(todo.items)):[];
  let itemsHtml=items.map((it,i)=>todoItemHtml(it,i)).join('');

  openModal(`
    <div class="editor-layout">
      <div class="editor-meta">
        <span style="font-size:12px;font-weight:600;color:var(--text3)">Folder</span>
        <select class="form-select" id="td-folder">${folderSelect(todo?todo.folderId:S.folders[0]?.id)}</select>
      </div>
      <div class="editor-topbar">
        <button class="ibtn" id="td-cancel" title="Cancel"><span class="ms">close</span></button>
        <input class="editor-title-input" id="td-title" placeholder="To-Do list title…" value="${todo?todo.title:''}">
        <button class="ibtn" id="td-dup" title="Duplicate"><span class="ms">content_copy</span></button>
        <button class="ibtn" id="td-share" title="Share"><span class="ms">ios_share</span></button>
        <button class="ibtn" id="td-dl" title="Download"><span class="ms">download</span></button>
        ${todo?`<button class="ibtn danger" id="td-del" title="Delete"><span class="ms">delete</span></button>`:''}
        <button class="ibtn accent" id="td-save" title="Save"><span class="ms">check</span></button>
      </div>
      <div class="todo-list" id="todo-list">${itemsHtml}</div>
      <button class="add-todo-btn" id="add-todo-row" title="Add item"><span class="ms">add</span></button>
    </div>`,
  'modal modal-full');

  document.getElementById('add-todo-row').addEventListener('click',()=>addTodoItem());
  document.getElementById('td-cancel').addEventListener('click',closeModal);
  document.getElementById('td-save').addEventListener('click',saveTodo);
  if(todo){
    document.getElementById('td-del').addEventListener('click',()=>{if(confirm('Delete to-do?')){deleteItem('todo',todo.id);closeModal();}});
    document.getElementById('td-dup').addEventListener('click',()=>{duplicateItem('todo',todo.id);closeModal();});
  }else{
    document.getElementById('td-dup').addEventListener('click',()=>toast('Save first to duplicate','info'));
  }
  document.getElementById('td-share').addEventListener('click',e=>openExportMenu('todo',todo?.id,'share',e.currentTarget));
  document.getElementById('td-dl').addEventListener('click',e=>openExportMenu('todo',todo?.id,'download',e.currentTarget));
  setupTodoListeners();

  function addTodoItem(){
    const list=document.getElementById('todo-list');
    const idx=list.children.length;
    const it={id:uid(),text:'',done:false};
    list.insertAdjacentHTML('beforeend',todoItemHtml(it,idx));
    setupTodoListeners();
    list.lastElementChild.querySelector('.todo-text').focus();
  }
  function saveTodo(){
    const folderId=document.getElementById('td-folder').value;
    if(!folderId){toast('Select a folder','error');return}
    const title=document.getElementById('td-title').value.trim()||'Untitled To-Do';
    const rows=[...document.querySelectorAll('.todo-item')];
    const newItems=rows.map(r=>({id:r.dataset.id,text:r.querySelector('.todo-text').value,done:r.querySelector('.todo-check').classList.contains('done')}));
    if(todo){todo.title=title;todo.folderId=folderId;todo.items=newItems;}
    else{S.todos.push({id:uid(),folderId,title,items:newItems,date:S.selectedDate||today(),createdAt:Date.now()});}
    saveS();renderDayPanel();renderCalendar();toast('To-Do saved','success');closeModal();
  }
}
function todoItemHtml(it,i){
  return`<div class="todo-item" data-id="${it.id}">
    <button class="todo-check${it.done?' done':''}" title="Toggle"><span class="ms">check</span></button>
    <input class="todo-text${it.done?' done-text':''}" value="${it.text||''}" placeholder="Task item…">
    <button class="todo-del" title="Remove"><span class="ms">close</span></button>
  </div>`;
}
function setupTodoListeners(){
  document.querySelectorAll('.todo-check').forEach(btn=>{
    btn.onclick=function(){
      this.classList.toggle('done');
      const inp=this.nextElementSibling;
      if(inp)inp.classList.toggle('done-text',this.classList.contains('done'));
    };
  });
  document.querySelectorAll('.todo-del').forEach(btn=>{btn.onclick=function(){this.closest('.todo-item').remove()}});
  document.querySelectorAll('.todo-text').forEach(inp=>{
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){e.preventDefault();document.getElementById('add-todo-row').click();}
    });
  });
}

   TABLE EDITOR

function openTableEditor(id){
  if(!checkFolders()&&!id)return;
  const tbl=id?S.tables.find(t=>t.id===id):null;
  let tableData=tbl?JSON.parse(JSON.stringify(tbl.data)):[
    ['Column A','Column B','Column C'],
    ['','',''],['','','']
  ];

  openModal(`
    <div class="editor-layout">
      <div class="editor-meta">
        <span style="font-size:12px;font-weight:600;color:var(--text3)">Folder</span>
        <select class="form-select" id="tb-folder">${folderSelect(tbl?tbl.folderId:S.folders[0]?.id)}</select>
      </div>
      <div class="editor-topbar">
        <button class="ibtn" id="tb-cancel" title="Cancel"><span class="ms">close</span></button>
        <input class="editor-title-input" id="tb-title" placeholder="Table title…" value="${tbl?tbl.title:''}">
        <button class="ibtn" id="tb-dup" title="Duplicate"><span class="ms">content_copy</span></button>
        <button class="ibtn" id="tb-share" title="Share"><span class="ms">ios_share</span></button>
        <button class="ibtn" id="tb-dl" title="Download"><span class="ms">download</span></button>
        ${tbl?`<button class="ibtn danger" id="tb-del" title="Delete"><span class="ms">delete</span></button>`:''}
        <button class="ibtn accent" id="tb-save" title="Save"><span class="ms">check</span></button>
      </div>
      <div class="table-toolbar">
        <button class="btn ghost" id="tb-add-row"><span class="ms">add</span>Row</button>
        <button class="btn ghost" id="tb-del-row"><span class="ms">remove</span>Row</button>
        <button class="btn ghost" id="tb-add-col"><span class="ms">add</span>Col</button>
        <button class="btn ghost" id="tb-del-col"><span class="ms">remove</span>Col</button>
        <div style="width:1px;height:24px;background:var(--border2);margin:0 2px;flex-shrink:0"></div>
        <button class="btn ghost" id="tb-bold" title="Bold"><span class="ms">format_bold</span></button>
        <button class="btn ghost" id="tb-italic" title="Italic"><span class="ms">format_italic</span></button>
        <button class="btn ghost" id="tb-underline" title="Underline"><span class="ms">format_underlined</span></button>
        <button class="btn ghost" id="tb-align-l" title="Left"><span class="ms">format_align_left</span></button>
        <button class="btn ghost" id="tb-align-c" title="Center"><span class="ms">format_align_center</span></button>
        <button class="btn ghost" id="tb-align-r" title="Right"><span class="ms">format_align_right</span></button>
        <div style="width:1px;height:24px;background:var(--border2);margin:0 2px;flex-shrink:0"></div>
        <select class="col-resize-select" id="tb-col-w">
          <option value="">W: Auto</option>
          <option value="60px">60px</option><option value="80px">80px</option>
          <option value="100px">100px</option><option value="120px">120px</option>
          <option value="150px">150px</option><option value="200px">200px</option>
        </select>
        <select class="col-resize-select" id="tb-row-h">
          <option value="">H: Auto</option>
          <option value="32px">32px</option><option value="40px">40px</option>
          <option value="48px">48px</option><option value="60px">60px</option>
        </select>
      </div>
      <div class="table-wrap" id="table-wrap"></div>
    </div>`,
  'modal modal-full');

  function renderTable(){
    const wrap=document.getElementById('table-wrap');
    if(!tableData||!tableData.length){wrap.innerHTML='<p style="color:var(--text3);padding:20px">Empty table</p>';return}
    const rows=tableData.length;const cols=tableData[0]?.length||0;
    let html=`<table class="data-table"><thead><tr><th class="row-num">#</th>`;
    for(let c=0;c<cols;c++)html+=`<th contenteditable="true" data-r="0" data-c="${c}" spellcheck="false">${tableData[0][c]||''}</th>`;
    html+=`</tr></thead><tbody>`;
    for(let r=1;r<rows;r++){
      html+=`<tr><td class="row-num">${r}</td>`;
      for(let c=0;c<cols;c++)html+=`<td contenteditable="true" data-r="${r}" data-c="${c}" spellcheck="false">${tableData[r]?.[c]||''}</td>`;
      html+=`</tr>`;
    }
    html+=`</tbody></table>`;
    wrap.innerHTML=html;
    wrap.querySelectorAll('[contenteditable][data-r]').forEach(cell=>{
      cell.addEventListener('blur',()=>{
        const r=+cell.dataset.r,c=+cell.dataset.c;
        if(!tableData[r])tableData[r]=[];
        tableData[r][c]=cell.textContent;
      });
      cell.addEventListener('keydown',e=>{
        if(e.key==='Tab'){e.preventDefault();const cells=[...wrap.querySelectorAll('[contenteditable][data-r]')];const idx=cells.indexOf(cell);if(idx+1<cells.length)cells[idx+1].focus();}
      });
    });
  }
  renderTable();

  document.getElementById('tb-add-row').addEventListener('click',()=>{
    const cols=tableData[0]?.length||3;tableData.push(new Array(cols).fill(''));renderTable();
  });
  document.getElementById('tb-del-row').addEventListener('click',()=>{if(tableData.length>1)tableData.pop();renderTable();});
  document.getElementById('tb-add-col').addEventListener('click',()=>{tableData=tableData.map(r=>[...r,'']);renderTable();});
  document.getElementById('tb-del-col').addEventListener('click',()=>{if((tableData[0]?.length||0)>1)tableData=tableData.map(r=>r.slice(0,-1));renderTable();});

  function tableFmt(cmd){const focused=document.querySelector('.data-table [contenteditable]:focus');if(focused){document.execCommand(cmd,false,null);}}
  ['bold','italic','underline'].forEach(cmd=>{
    const id={'bold':'tb-bold','italic':'tb-italic','underline':'tb-underline'}[cmd];
    document.getElementById(id).addEventListener('click',()=>tableFmt(cmd));
  });
  ['l','c','r'].forEach(dir=>{
    const map={l:'justifyLeft',c:'justifyCenter',r:'justifyRight'};
    document.getElementById(`tb-align-${dir}`).addEventListener('click',()=>tableFmt(map[dir]));
  });
  document.getElementById('tb-col-w').addEventListener('change',e=>{
    const w=e.target.value;
    document.querySelectorAll('.data-table th:not(.row-num),.data-table td:not(.row-num)').forEach(cell=>{cell.style.width=w||'';cell.style.minWidth=w||'90px';});
  });
  document.getElementById('tb-row-h').addEventListener('change',e=>{
    const h=e.target.value;document.querySelectorAll('.data-table tr').forEach(row=>{row.style.height=h||'';});
  });

  function syncTableFromDom(){
    document.querySelectorAll('[contenteditable][data-r]').forEach(cell=>{
      const r=+cell.dataset.r,c=+cell.dataset.c;if(!tableData[r])tableData[r]=[];tableData[r][c]=cell.textContent;
    });
  }
  function saveTable(){
    syncTableFromDom();
    const folderId=document.getElementById('tb-folder').value;
    if(!folderId){toast('Select a folder','error');return}
    const title=document.getElementById('tb-title').value.trim()||'Untitled Table';
    if(tbl){tbl.title=title;tbl.folderId=folderId;tbl.data=tableData;}
    else{S.tables.push({id:uid(),folderId,title,data:tableData,date:S.selectedDate||today(),createdAt:Date.now()});}
    saveS();renderDayPanel();renderCalendar();toast('Table saved','success');closeModal();
  }
  document.getElementById('tb-cancel').addEventListener('click',closeModal);
  document.getElementById('tb-save').addEventListener('click',saveTable);
  if(tbl){
    document.getElementById('tb-del').addEventListener('click',()=>{if(confirm('Delete table?')){deleteItem('table',tbl.id);closeModal();}});
    document.getElementById('tb-dup').addEventListener('click',()=>{duplicateItem('table',tbl.id);closeModal();});
  }else{
    document.getElementById('tb-dup').addEventListener('click',()=>toast('Save first to duplicate','info'));
  }
  document.getElementById('tb-share').addEventListener('click',e=>{syncTableFromDom();openExportMenu('table',tbl?.id,'share',e.currentTarget,tableData)});
  document.getElementById('tb-dl').addEventListener('click',e=>{syncTableFromDom();openExportMenu('table',tbl?.id,'download',e.currentTarget,tableData)});
}

function openEditor(type,id){

/* ═══════════════════════════════════════════════
   CRUD OPERATIONS
═══════════════════════════════════════════════ */
function deleteItem(type,id){
  if(type==='note')S.notes=S.notes.filter(n=>n.id!==id);
  else if(type==='todo')S.todos=S.todos.filter(t=>t.id!==id);
  else if(type==='table')S.tables=S.tables.filter(t=>t.id!==id);
  saveS();renderDayPanel();renderCalendar();toast('Deleted','success');
}
function duplicateItem(type,id){
  if(type==='note'){const n=S.notes.find(n=>n.id===id);if(n)S.notes.push({...JSON.parse(JSON.stringify(n)),id:uid(),title:'Copy of '+n.title,createdAt:Date.now()});}
  else if(type==='todo'){const t=S.todos.find(t=>t.id===id);if(t)S.todos.push({...JSON.parse(JSON.stringify(t)),id:uid(),title:'Copy of '+t.title,createdAt:Date.now()});}
  else if(type==='table'){const t=S.tables.find(t=>t.id===id);if(t)S.tables.push({...JSON.parse(JSON.stringify(t)),id:uid(),title:'Copy of '+t.title,createdAt:Date.now()});}
  saveS();renderDayPanel();renderCalendar();toast('Duplicated','success');
}
function deleteFolder(id){
  if(!confirm('Delete folder and all its items?'))return;
  S.folders=S.folders.filter(f=>f.id!==id);
  S.notes=S.notes.filter(n=>n.folderId!==id);
  S.todos=S.todos.filter(t=>t.folderId!==id);
  S.tables=S.tables.filter(t=>t.folderId!==id);
  saveS();renderDayPanel();renderCalendar();toast('Folder deleted','success');
}
function duplicateFolder(id){
  const f=S.folders.find(f=>f.id===id);if(!f)return;
  const newId=uid();
  S.folders.push({...f,id:newId,name:'Copy of '+f.name,createdAt:Date.now()});
  S.notes.filter(n=>n.folderId===id).forEach(n=>S.notes.push({...JSON.parse(JSON.stringify(n)),id:uid(),folderId:newId,createdAt:Date.now()}));
  S.todos.filter(t=>t.folderId===id).forEach(t=>S.todos.push({...JSON.parse(JSON.stringify(t)),id:uid(),folderId:newId,createdAt:Date.now()}));
  S.tables.filter(t=>t.folderId===id).forEach(t=>S.tables.push({...JSON.parse(JSON.stringify(t)),id:uid(),folderId:newId,createdAt:Date.now()}));
  saveS();toast('Folder duplicated','success');
}

  closeVault();

function sortedFolders(){
  const fols=[...S.folders];
  if(S.foldersSort==='name-asc')fols.sort((a,b)=>a.name.localeCompare(b.name));
  else if(S.foldersSort==='name-desc')fols.sort((a,b)=>b.name.localeCompare(a.name));
  else if(S.foldersSort==='oldest')fols.sort((a,b)=>a.createdAt-b.createdAt);
  else fols.sort((a,b)=>b.createdAt-a.createdAt);
  return fols;
}
function getFolderItemCount(fid){
  return S.notes.filter(n=>n.folderId===fid).length+S.todos.filter(t=>t.folderId===fid).length+S.tables.filter(t=>t.folderId===fid).length;
}
function renderFolderCards(){
  const grid=document.getElementById('folders-grid');
  const fols=sortedFolders();
  if(!fols.length){grid.innerHTML=`<div class="empty-state" style="width:100%"><span class="ms">folder_open</span><p>No folders yet. Create one!</p></div>`;return}
  const v=S.foldersView;
  const createdStr=(f)=>f.createdAt?new Date(f.createdAt).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'}):'';
  grid.innerHTML=fols.map(f=>{
    const cnt=getFolderItemCount(f.id);
    if(v==='grid'){
      return`<div class="folder-card" data-fid="${f.id}">
        <div class="folder-card-top">
          <div class="folder-card-icon" style="background:${f.color}20"><span class="ms" style="color:${f.color}">folder</span></div>
          <div style="min-width:0"><div class="folder-card-name">${f.name}</div><div class="folder-card-count">${cnt} item${cnt!==1?'s':''}</div></div>
        </div>
        <div class="folder-card-actions">
          <button class="act-btn" data-fa="edit" data-fid="${f.id}" title="Edit"><span class="ms">edit</span></button>
          <button class="act-btn" data-fa="dup" data-fid="${f.id}" title="Duplicate"><span class="ms">content_copy</span></button>
          <button class="act-btn red" data-fa="del" data-fid="${f.id}" title="Delete"><span class="ms">delete</span></button>
        </div>
      </div>`;
    }else if(v==='list'){
      return`<div class="folder-card list-card" data-fid="${f.id}">
        <div class="folder-card-top">
          <div class="folder-card-icon" style="background:${f.color}20"><span class="ms" style="color:${f.color}">folder</span></div>
          <div style="min-width:0"><div class="folder-card-name">${f.name}</div><div class="folder-card-count">${cnt} item${cnt!==1?'s':''} • ${createdStr(f)}</div></div>
        </div>
        <div class="folder-card-actions">
          <button class="act-btn" data-fa="edit" data-fid="${f.id}" title="Edit"><span class="ms">edit</span></button>
          <button class="act-btn" data-fa="dup" data-fid="${f.id}" title="Duplicate"><span class="ms">content_copy</span></button>
          <button class="act-btn red" data-fa="del" data-fid="${f.id}" title="Delete"><span class="ms">delete</span></button>
        </div>
      </div>`;
    }else{
      return`<div class="folder-card compact-card" data-fid="${f.id}">
        <div class="folder-card-top">
          <div class="folder-card-icon" style="background:${f.color}20"><span class="ms" style="color:${f.color}">folder</span></div>
          <span class="folder-card-name">${f.name}</span>
          <span class="folder-card-count" style="margin-left:auto;margin-right:4px">${cnt}</span>
        </div>
        <div class="folder-card-actions">
          <button class="act-btn" data-fa="edit" data-fid="${f.id}" title="Edit"><span class="ms">edit</span></button>
          <button class="act-btn" data-fa="dup" data-fid="${f.id}" title="Duplicate"><span class="ms">content_copy</span></button>
          <button class="act-btn red" data-fa="del" data-fid="${f.id}" title="Delete"><span class="ms">delete</span></button>
        </div>
      </div>`;
    }
  }).join('');

  document.querySelectorAll('[data-fa]').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const fid=btn.dataset.fid;
      if(btn.dataset.fa==='edit'){
        overlay.classList.remove('show');modalRoot.innerHTML='';
        requestAnimationFrame(()=>openFolderModal(fid,openFoldersView));
      }
      else if(btn.dataset.fa==='dup'){duplicateFolder(fid);renderFolderCards();}
      else if(btn.dataset.fa==='del'){deleteFolder(fid);renderFolderCards();}
    });
  });
  // Stagger folder card entrance
  document.querySelectorAll('.folder-card').forEach((el,i)=>{
    el.style.animationDelay=`${i*45}ms`;
  });
  document.querySelectorAll('.folder-card').forEach(el=>{
    let lpTimer;
    function startLP(){
      lpTimer=setTimeout(()=>{
        document.querySelectorAll('.folder-card').forEach(c=>c.classList.remove('lp-active'));
        el.classList.add('lp-active');
        if(navigator.vibrate) navigator.vibrate(30);
      },500);
    }
    function cancelLP(){ clearTimeout(lpTimer); }
    el.addEventListener('mousedown', startLP);
    el.addEventListener('touchstart', startLP, {passive:true});
    el.addEventListener('mouseup', cancelLP);
    el.addEventListener('mouseleave', cancelLP);
    el.addEventListener('touchend', cancelLP);
    el.addEventListener('touchcancel', cancelLP);
    el.addEventListener('click',e=>{
      if(e.target.closest('[data-fa]')) return;
      if(el.classList.contains('lp-active')){ el.classList.remove('lp-active'); return; }
      openFolderItems(el.dataset.fid);
    });
  });
  // Tap anywhere else dismisses active folder
  setTimeout(()=>{
    document.querySelector('#fv-list')?.addEventListener('click',e=>{
      if(!e.target.closest('.folder-card')) document.querySelectorAll('.folder-card').forEach(c=>c.classList.remove('lp-active'));
    });
  },0);
}

function openFolderItems(fid){
  const f=getFolderById(fid);if(!f)return;
  const notes=S.notes.filter(n=>n.folderId===fid).map(n=>({...n,type:'note'}));
  const todos=S.todos.filter(t=>t.folderId===fid).map(t=>({...t,type:'todo'}));
  const tables=S.tables.filter(t=>t.folderId===fid).map(t=>({...t,type:'table'}));
  const all=[...notes,...todos,...tables].sort((a,b)=>a.createdAt-b.createdAt);

  openModal(`
    <div class="editor-layout" style="height:100%">
      <div class="folder-items-header">
        <button class="ibtn" id="fi-back"><span class="ms">arrow_back</span></button>
        <div class="folder-badge" style="background:${f.color}20"><span class="ms" style="color:${f.color}">folder</span></div>
        <h2 style="font-size:16px;font-weight:700">${f.name}</h2>
        <span class="chip" style="margin-left:8px">${all.length} items</span>

      <div class="folder-items-add-bar">
        <button class="create-btn" id="fi-new-note" style="flex:1;min-height:48px"><span class="ms">note_add</span>Note</button>
        <button class="create-btn" id="fi-new-todo" style="flex:1;min-height:48px"><span class="ms">checklist</span>To-Do</button>
        <button class="create-btn" id="fi-new-table" style="flex:1;min-height:48px"><span class="ms">table_chart</span>Table</button>
      </div>
      <div id="folder-items-list">
        ${all.length?all.map(it=>`
          <div class="folder-item-row" data-type="${it.type}" data-id="${it.id}">
            <div class="item-type-icon" style="width:36px;height:36px"><span class="ms">${typeIcon(it.type)}</span></div>
            <div style="flex:1;min-width:0">
              <div style="font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${it.title||'Untitled'}</div>
              <div style="font-size:11px;color:var(--text3)">${fmtDate(it.date)} • ${typeName(it.type)}</div>
            </div>
            <div style="display:flex;gap:2px;flex-shrink:0">
              <button class="act-btn" data-action="edit" data-type="${it.type}" data-id="${it.id}"><span class="ms">edit</span></button>
              <button class="act-btn" data-action="duplicate" data-type="${it.type}" data-id="${it.id}"><span class="ms">content_copy</span></button>
              <button class="act-btn" data-action="move" data-type="${it.type}" data-id="${it.id}" title="Move to folder"><span class="ms">drive_file_move</span></button>
              <button class="act-btn red" data-action="delete" data-type="${it.type}" data-id="${it.id}"><span class="ms">delete</span></button>
            </div>
          </div>`).join('')
        :`<div class="empty-state"><span class="ms">inventory_2</span><p>No items in this folder yet.</p></div>`}
      </div>
    </div>`,
  'modal modal-full');

  document.getElementById('fi-back').addEventListener('click',()=>{
    overlay.classList.remove('show');modalRoot.innerHTML='';
    requestAnimationFrame(()=>openFoldersView());
  });
  document.getElementById('fi-new-note').addEventListener('click',()=>{
    overlay.classList.remove('show');modalRoot.innerHTML='';
    S.selectedDate=S.selectedDate||today();
    requestAnimationFrame(()=>openNoteEditor());
  });
  document.getElementById('fi-new-todo').addEventListener('click',()=>{
    overlay.classList.remove('show');modalRoot.innerHTML='';
    S.selectedDate=S.selectedDate||today();
    requestAnimationFrame(()=>openTodoEditor());
  });
  document.getElementById('fi-new-table').addEventListener('click',()=>{
    overlay.classList.remove('show');modalRoot.innerHTML='';
    S.selectedDate=S.selectedDate||today();
    requestAnimationFrame(()=>openTableEditor());
  });
  document.querySelectorAll('[data-action]').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const{action,type,id}=btn.dataset;
      if(action==='edit'){
        overlay.classList.remove('show');modalRoot.innerHTML='';
        requestAnimationFrame(()=>openEditor(type,id));
      } else if(action==='duplicate'){
        duplicateItem(type,id);
        openFolderItems(fid);
      } else if(action==='delete'){
        deleteItem(type,id);
        openFolderItems(fid);
      } else if(action==='move'){
        openMoveItemModal(type,id,()=>openFolderItems(fid));
      }
    });
  });
  document.querySelectorAll('.folder-item-row').forEach((row,i)=>{
    row.style.animationDelay=`${i*40}ms`;
    row.addEventListener('click',e=>{
      if(e.target.closest('[data-action]'))return;
      overlay.classList.remove('show');modalRoot.innerHTML='';
      requestAnimationFrame(()=>openEditor(row.dataset.type,row.dataset.id));
    });

function openSettings(){
  closeVault();

  const ALL_FONTS=['Caveat','Comfortaa','DM Sans','Indie Flower','Inter','Kalam','Open Sans','Poppins','Reenie Beanie','Roboto'];
  const fontDropdown=(sel,cur)=>{
    const id=`fd-${sel}`;
    const opts=ALL_FONTS.map(f=>`<option value="${f}"${f===cur?' selected':''}>${f}</option>`).join('');
    return`<select class="form-select font-dd-select" id="${id}-sel" style="font-family:'${cur}',sans-serif">${opts}</select>`;
  };
  openModal(`
    <div class="modal-head">
      <button class="ibtn" id="set-close"><span class="ms">close</span></button>
      <h2>Settings</h2>
    </div>
    <div class="modal-body">

          <div class="theme-opt${theme==='dark'?' active':''}" data-theme="dark"><span class="ms">dark_mode</span>Dark</div>
          <div class="theme-opt${theme==='light'?' active':''}" data-theme="light"><span class="ms">light_mode</span>Light</div>
        </div>
      </div>

        <h3>Accent Color</h3>
        <div class="accent-row">
          ${aSwatches}
          <div class="accent-custom" title="Custom color">
            <span class="ms">colors</span>
            <input type="color" id="custom-accent" value="${accent}">
          </div>
        </div>
      </div>
      <div class="settings-section">
        <h3>Font Size</h3>
        <div class="slider-row">
          <span style="font-size:11px;color:var(--text3)">A</span>
          <input type="range" id="fs-slider" min="11" max="50" value="${fontSize}">
          <span class="slider-val" id="fs-val">${fontSize}px</span>
          <span style="font-size:17px;color:var(--text3)">A</span>
        </div>
      </div>
      <div class="settings-section">
        <h3>UI Font</h3>
        ${fontDropdown('ui',uiFont)}
      </div>
      <div class="settings-section">
        <h3>Items Font</h3>
        ${fontDropdown('item',itemFont)}
      </div>
      <div class="settings-section" id="enc-settings-section">
        <h3>Security & Encryption</h3>

      </div>

  document.getElementById('set-close').addEventListener('click',()=>{closeModal();setNavActive('nav-home');});
  document.querySelectorAll('.theme-opt').forEach(opt=>{

      S.settings.theme=opt.dataset.theme;applySettings();saveS();

    });
  });
  document.querySelectorAll('.accent-swatch[data-color]').forEach(sw=>{
    sw.addEventListener('click',()=>{
      S.settings.accent=sw.dataset.color;applySettings();saveS();
      document.querySelectorAll('.accent-swatch').forEach(s=>s.classList.remove('active'));
      sw.classList.add('active');
    });
  });
  document.getElementById('custom-accent').addEventListener('input',e=>{

    document.querySelectorAll('.accent-swatch').forEach(s=>s.classList.remove('active'));
  });
  document.getElementById('fs-slider').addEventListener('input',e=>{
    S.settings.fontSize=+e.target.value;document.getElementById('fs-val').textContent=e.target.value+'px';applySettings();saveS();
  });
  // Font selects
  ['ui','item'].forEach(sel=>{
    const id=`fd-${sel}`;
    const selectEl=document.getElementById(`${id}-sel`);
    if(!selectEl)return;
    selectEl.addEventListener('change',()=>{
      const f=selectEl.value;
      if(sel==='ui')S.settings.uiFont=f;
      else S.settings.itemFont=f;
      selectEl.style.fontFamily=`'${f}',sans-serif`;
      applySettings();saveS();
    });
  });
  // Stagger settings sections
  document.querySelectorAll('.settings-section').forEach((el,i)=>{
    el.style.animationDelay=`${i*60}ms`;
  });
  const encBody=document.getElementById('enc-settings-body');
  if(encBody) renderEncSettings(encBody);
}

function openSearch(){
  closeVault();
  openModal(`
    <div class="editor-layout" style="height:100%">
      <div class="search-input-wrap">
        <span class="ms">search</span>
        <input type="text" id="search-input" placeholder="Search everything…" autofocus>
        <button class="ibtn" id="search-close"><span class="ms">close</span></button>
      </div>
      <div id="search-results"><div class="search-empty"><span class="ms">search</span><p>Start typing to search</p></div></div>
    </div>`,
  'modal modal-full');

  document.getElementById('search-close').addEventListener('click',()=>{closeModal();setNavActive('nav-home');});
  document.getElementById('search-input').addEventListener('input',e=>doSearch(e.target.value));
  document.getElementById('search-input').focus();
}
function doSearch(q){
  q=q.toLowerCase().trim();
  const res=document.getElementById('search-results');
  if(!q){res.innerHTML=`<div class="search-empty"><span class="ms">search</span><p>Start typing to search</p></div>`;return}
  const folders=S.folders.filter(f=>f.name.toLowerCase().includes(q));
  const notes=S.notes.filter(n=>n.title?.toLowerCase().includes(q)||n.content?.toLowerCase().includes(q));
  const todos=S.todos.filter(t=>t.title?.toLowerCase().includes(q)||t.items?.some(i=>i.text?.toLowerCase().includes(q)));
  const tables=S.tables.filter(t=>t.title?.toLowerCase().includes(q));

  if(!folders.length&&!notes.length&&!todos.length&&!tables.length){
    res.innerHTML=`<div class="search-empty"><span class="ms">search_off</span><p>No results for "<strong>${q}</strong>"</p></div>`;return;
  }
  let html='';
  if(folders.length){
    html+=`<div class="search-group-title">Folders</div>`;
    html+=folders.map(f=>`<div class="search-result-item" data-type="folder" data-id="${f.id}">
      <div class="search-result-icon" style="background:${f.color}20"><span class="ms" style="color:${f.color}">folder</span></div>
      <div class="search-result-info"><div class="search-result-title">${f.name}</div><div class="search-result-sub">${getFolderItemCount(f.id)} items</div></div>
    </div>`).join('');
  }
  if(notes.length){
    html+=`<div class="search-group-title">Notes</div>`;
    html+=notes.map(n=>{const f=getFolderById(n.folderId);return`<div class="search-result-item" data-type="note" data-id="${n.id}">
      <div class="search-result-icon"><span class="ms">note</span></div>
      <div class="search-result-info"><div class="search-result-title">${n.title||'Untitled'}</div><div class="search-result-sub">${f?f.name:'—'} • ${fmtDate(n.date)}</div></div>
    </div>`}).join('');
  }
  if(todos.length){
    html+=`<div class="search-group-title">To-Do Lists</div>`;
    html+=todos.map(t=>{const f=getFolderById(t.folderId);return`<div class="search-result-item" data-type="todo" data-id="${t.id}">
      <div class="search-result-icon"><span class="ms">checklist</span></div>
      <div class="search-result-info"><div class="search-result-title">${t.title||'Untitled'}</div><div class="search-result-sub">${f?f.name:'—'} • ${fmtDate(t.date)}</div></div>
    </div>`}).join('');
  }
  if(tables.length){
    html+=`<div class="search-group-title">Tables</div>`;
    html+=tables.map(t=>{const f=getFolderById(t.folderId);return`<div class="search-result-item" data-type="table" data-id="${t.id}">
      <div class="search-result-icon"><span class="ms">table_chart</span></div>
      <div class="search-result-info"><div class="search-result-title">${t.title||'Untitled'}</div><div class="search-result-sub">${f?f.name:'—'} • ${fmtDate(t.date)}</div></div>
    </div>`}).join('');
  }
  res.innerHTML=html;
  res.querySelectorAll('.search-result-item').forEach((el,i)=>{
    el.style.animationDelay=`${i*35}ms`;
    el.addEventListener('click',()=>{
      const{type,id}=el.dataset;
      // Bypass close animation to avoid 170ms timeout wiping the next modal
      overlay.classList.remove('show');modalRoot.innerHTML='';
      setNavActive('nav-home');
      if(type==='folder'){requestAnimationFrame(()=>openFolderItems(id));}
      else{
        const item=[...S.notes,...S.todos,...S.tables].find(i=>i.id===id);
        if(item){
          S.selectedDate=item.date;
          const[y,m]=item.date.split('-');
          S.calYear=+y;S.calMonth=+m-1;
          renderCalendar();renderDayPanel();
          document.getElementById('day-panel').classList.add('open');
          requestAnimationFrame(()=>openEditor(type,id));
        }
      }
    });
  });
}

/* ═══════════════════════════════════════════════
   EXPORT / SHARE / DOWNLOAD
═══════════════════════════════════════════════ */
function getItemContent(type,id){
  if(type==='note'){const n=S.notes.find(n=>n.id===id);if(!n)return null;return{title:n.title,text:n.content?.replace(/<[^>]+>/g,'')||''}}
  if(type==='todo'){const t=S.todos.find(t=>t.id===id);if(!t)return null;return{title:t.title,text:(t.items||[]).map(i=>(i.done?'✓ ':'☐ ')+i.text).join('\n')}}
  if(type==='table'){const t=S.tables.find(t=>t.id===id);if(!t)return null;return{title:t.title,text:(t.data||[]).map(r=>r.join('\t')).join('\n'),data:t.data}}
  return null;
}
function exportText(type,id,mode){
  const c=getItemContent(type,id);if(!c)return;
  // Convert HTML to plain text with proper newlines
  const tmp=document.createElement('div');
  tmp.style.cssText='position:fixed;left:-9999px;top:-9999px;white-space:pre-wrap';
  tmp.innerHTML=c.text;
  // Insert newlines before block elements
  tmp.querySelectorAll('p,div,br,h1,h2,h3,h4,h5,h6,li').forEach(el=>{
    el.insertAdjacentText('afterend','\n');
  });
  document.body.appendChild(tmp);
  const plain=(tmp.innerText||tmp.textContent||'').replace(/\n{3,}/g,'\n\n').trim();
  document.body.removeChild(tmp);
  const sep='-'.repeat(40);
  const text=`${c.title}\n${sep}\n${plain}`;
  if(mode==='share'&&navigator.share){navigator.share({title:c.title,text});return;}
  // UTF-8 BOM ensures proper encoding on all viewers
  const blob=new Blob(['\ufeff'+text],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${c.title||'noical'}.txt`;a.click();
  toast('Downloaded as text','success');
}
function exportPDF(type,id,mode){
  const c=getItemContent(type,id);if(!c)return;
  try{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF();
    doc.setFont('helvetica','bold');doc.setFontSize(18);doc.text(c.title||'Untitled',20,25);
    let yOff=40;
    if(type==='note'){const n=S.notes.find(n=>n.id===id);if(n&&n.pinned){doc.setFillColor(0,0,0);doc.circle(105,yOff-4,2,'F');yOff+=10;}}
    doc.setFont('helvetica','normal');doc.setFontSize(11);
    const lines=doc.splitTextToSize(c.text,170);doc.text(lines,20,yOff);
    if(mode==='share'){const uri=doc.output('datauristring');window.open(uri,'_blank');}
    else doc.save(`${c.title||'noical'}.pdf`);
    toast('PDF ready','success');
  }catch(e){toast('PDF error','error');}
}
function exportXLSX(type,id,data){
  let d=data;
  if(!d){const t=S.tables.find(t=>t.id===id);if(!t)return;d=t.data;}
  try{
    const wb=window.XLSX.utils.book_new();
    const ws=window.XLSX.utils.aoa_to_sheet(d||[[]]);
    const t=S.tables.find(t=>t.id===id);
    window.XLSX.utils.book_append_sheet(wb,ws,'Sheet1');
    window.XLSX.writeFile(wb,`${t?.title||'table'}.xlsx`);
    toast('Downloaded as .xlsx','success');
  }catch(e){toast('XLSX error','error');}
}
function exportImage(type,id,mode){
  toast('Preparing image…');
  const c=getItemContent(type,id);if(!c)return;
  const note=type==='note'?S.notes.find(n=>n.id===id):null;

  const PAD=40;const LH=32;const W=700;const SC=2;
  const bgColor=note?.bgColor||'#faf8f4';
  const noteFont=note?.noteFont?`'${note.noteFont}',sans-serif`:'sans-serif';
  const textColor='#1a1a2e';
  const bg=note?.bg||'plain';

  // Build content div (transparent bg — background drawn manually on canvas)
  const tmp=document.createElement('div');
  tmp.style.cssText=`position:fixed;left:-9999px;top:-9999px;width:${W}px;padding:${PAD}px;box-sizing:border-box;background:transparent;`;
  const contentHtml=(()=>{
    if(type!=='note')return`<pre style="white-space:pre-wrap;margin:0">${c.text}</pre>`;
    if(!note)return'';
    const _tmp=document.createElement('div');
    _tmp.innerHTML=note.content;
    _tmp.querySelectorAll('[data-pin="1"]').forEach(m=>m.remove());
    return _tmp.innerHTML;
  })();
  const pinHtml=''; // Pin marker excluded from image export

  tmp.innerHTML=
    `<h2 style="font-size:20px;font-weight:700;color:${textColor};font-family:${noteFont};`+
    `line-height:${LH}px;margin:0 0 ${LH}px 0;padding:0;">${c.title||'Untitled'}</h2>`+
    `${pinHtml}<div style="font-size:14px;line-height:${LH}px;color:${textColor};font-family:${noteFont};margin:0;padding:0;">${contentHtml}</div>`;
  document.body.appendChild(tmp);

  function compose(bgCanvas){
    html2canvas(tmp,{scale:SC,useCORS:true,logging:false,backgroundColor:null}).then(contentCanvas=>{
      tmp.remove();
      // Final canvas matches content size
      const final=document.createElement('canvas');
      final.width=contentCanvas.width;
      final.height=contentCanvas.height;
      const ctx=final.getContext('2d');
      // Draw background
      if(bgCanvas){
        // tile the pattern canvas
        const pat=ctx.createPattern(bgCanvas,'repeat');
        ctx.fillStyle=pat;
        ctx.fillRect(0,0,final.width,final.height);
      }else{
        ctx.fillStyle=bgColor;
        ctx.fillRect(0,0,final.width,final.height);
      }
      // Draw sheet pattern lines via Canvas 2D
      ctx.save();
      if(bg==='ruled'){
        ctx.strokeStyle='#c0ccde';ctx.lineWidth=SC;
        for(let y=(PAD+LH)*SC;y<final.height;y+=LH*SC){
          ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(final.width,y);ctx.stroke();
        }
      }else if(bg==='square'){
        ctx.strokeStyle='#ccd4e4';ctx.lineWidth=SC;
        for(let y=PAD*SC;y<final.height;y+=LH*SC){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(final.width,y);ctx.stroke();}
        for(let x=PAD*SC;x<final.width;x+=LH*SC){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,final.height);ctx.stroke();}
      }else if(bg==='dotted'){
        ctx.fillStyle='#b0bcd4';
        const gap=24*SC;
        for(let y=PAD*SC;y<final.height;y+=gap){
          for(let x=PAD*SC;x<final.width;x+=gap){
            ctx.beginPath();ctx.arc(x,y,1.5*SC,0,Math.PI*2);ctx.fill();
          }
        }
      }
      ctx.restore();
      // Composite text content on top
      ctx.drawImage(contentCanvas,0,0);
      final.toBlob(blob=>{
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download=`${c.title||'noical'}.png`;
        a.click();
        toast('Downloaded as image','success');
      });
    }).catch(()=>{tmp.remove();toast('Image export error','error');});
  }

  // For custom bg image: load it onto an offscreen canvas first
  if(bg==='custom'&&note?.customBg){
    const img=new Image();
    img.onload=()=>{
      const bc=document.createElement('canvas');
      bc.width=W*SC;bc.height=1; // height will be overridden — use plain fill instead
      const bx=bc.getContext('2d');
      // We'll just draw the image directly in compose via a flag
      // Instead: store img reference and draw in compose
      html2canvas(tmp,{scale:SC,useCORS:true,logging:false,backgroundColor:null}).then(contentCanvas=>{
        tmp.remove();
        const final=document.createElement('canvas');
        final.width=contentCanvas.width;final.height=contentCanvas.height;
        const ctx=final.getContext('2d');
        ctx.drawImage(img,0,0,final.width,final.height);
        ctx.drawImage(contentCanvas,0,0);
        final.toBlob(blob=>{
          const a=document.createElement('a');a.href=URL.createObjectURL(blob);
          a.download=`${c.title||'noical'}.png`;a.click();
          toast('Downloaded as image','success');
        });
      }).catch(()=>{tmp.remove();toast('Image export error','error');});
    };
    img.onerror=()=>compose(null);
    img.src=note.customBg;
  }else{
    compose(null);
  }
}

function setupEvents(){
  // Logo click → lock & return to password screen

    goHome();

  });
  // Stub home btn (hidden, used by JS elsewhere)

  // Calendar nav
  document.getElementById('month-sel').addEventListener('change',e=>{
    const prev=S.calMonth;S.calMonth=+e.target.value;
    renderCalendar(S.calMonth>prev?'right':'left');
  });
  document.getElementById('year-sel').addEventListener('change',e=>{
    const prev=S.calYear;S.calYear=+e.target.value;

  });

    if(S.calMonth===11){S.calMonth=0;S.calYear++;}else{S.calMonth++;}
    renderCalendar('right');
  });

  // Day panel
  document.getElementById('close-panel').addEventListener('click',()=>{
    const p=document.getElementById('day-panel');
    p.classList.remove('open','expanded');
    S.selectedDate=null;renderCalendar();
  });
  document.getElementById('expand-panel').addEventListener('click',()=>{
    const p=document.getElementById('day-panel');
    const isExpanded=p.classList.contains('expanded');
    p.classList.toggle('expanded',!isExpanded);
    p.classList.toggle('open',isExpanded);
    document.getElementById('expand-panel').querySelector('.ms').textContent=isExpanded?'expand_less':'expand_more';
  });
  // Sheet handle: tap to toggle expand
  document.getElementById('sheet-handle').addEventListener('click',()=>{
    const p=document.getElementById('day-panel');
    p.classList.toggle('expanded');
    const isExp=p.classList.contains('expanded');
    document.getElementById('expand-panel').querySelector('.ms').textContent=isExp?'expand_more':'expand_less';
  });

  // Create buttons
  document.getElementById('dp-new-folder').addEventListener('click',()=>openFolderModal());
  document.getElementById('dp-new-note').addEventListener('click',()=>{if(!S.selectedDate){toast('Select a day first');return}openNoteEditor()});
  document.getElementById('dp-new-todo').addEventListener('click',()=>{if(!S.selectedDate){toast('Select a day first');return}openTodoEditor()});
  document.getElementById('dp-new-table').addEventListener('click',()=>{if(!S.selectedDate){toast('Select a day first');return}openTableEditor()});

  // Swipe down on day panel to close
  let touchStartY=0;
  const panel=document.getElementById('day-panel');
  panel.addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY;},{passive:true});
  panel.addEventListener('touchend',e=>{
    const dy=e.changedTouches[0].clientY-touchStartY;
    if(dy>60){
      if(panel.classList.contains('expanded')){
        panel.classList.remove('expanded');
        document.getElementById('expand-panel').querySelector('.ms').textContent='expand_less';
      }else{
        panel.classList.remove('open');S.selectedDate=null;renderCalendar();
      }
    }
  },{passive:true});
}

/* ═══════════════════════════════════════════════
   ENCRYPTION LOCK SCREEN
═══════════════════════════════════════════════ */
function _encStatus(msg, type=''){
  const el=document.getElementById('enc-status');
  if(!el) return;
  el.textContent=msg;
  el.className='enc-status'+(type?' '+type:'');
}
function _encIconState(state){
  const wrap=document.getElementById('enc-icon');
  const icon=document.getElementById('enc-icon-ms');
  if(!wrap||!icon) return;
  wrap.className='enc-icon-wrap'+(state==='error'?' error':state==='pulse'?' pulse':'');
  icon.textContent=state==='error'?'lock':state==='pulse'?'key':'key';
}

function _passphraseStrength(p){
  let score=0;
  if(p.length>=8)  score++;
  if(p.length>=14) score++;
  if(/[A-Z]/.test(p)&&/[a-z]/.test(p)) score++;
  if(/[0-9]/.test(p))  score++;
  if(/[^A-Za-z0-9]/.test(p)) score++;
  return Math.min(4, Math.ceil(score*4/5));
}

function _updateStrengthMeter(val){
  const bars=document.querySelectorAll('.enc-strength-bar');
  const cls=['','weak','fair','good','strong'];
  bars.forEach((b,i)=>{
    b.className='enc-strength-bar';
    if(i<val) b.classList.add(cls[val]);
  });
}

/* Session passphrase cache — cleared when tab closes */
const _SES_KEY = '_nc_p';
function _cachePass(p){ try{ sessionStorage.setItem(_SES_KEY,p); }catch(e){} }
function _getCachedPass(){ try{ return sessionStorage.getItem(_SES_KEY)||''; }catch(e){return '';} }
function _clearCachedPass(){ try{ sessionStorage.removeItem(_SES_KEY); }catch(e){} }

/* mode: 'unlock' | 'setup' | 'migrate' | 'change' */
function showEncLockScreen(mode, onDone){
  return new Promise(resolve=>{
    const lock      = document.getElementById('enc-lock');
    const title     = document.getElementById('enc-title');
    const sub       = document.getElementById('enc-sub');
    const input     = document.getElementById('enc-passphrase');
    const confirm   = document.getElementById('enc-confirm');
    const confWrap  = document.getElementById('enc-confirm-wrap');
    const submitBtn = document.getElementById('enc-submit-btn');
    const btnLabel  = document.getElementById('enc-btn-label');
    const btnIcon   = document.getElementById('enc-btn-icon');
    const skipBtn   = document.getElementById('enc-skip-btn');
    const strength  = document.getElementById('enc-strength');
    const visTgl    = document.getElementById('enc-vis-toggle');
    const passForm  = document.getElementById('enc-pass-form');
    const bioSection= document.getElementById('enc-bio-section');
    const bioBtn    = document.getElementById('enc-bio-btn');
    const bioLabel  = document.getElementById('enc-bio-label');

    lock.style.display='flex';
    submitBtn.disabled=false;
    input.value='';
    if(confirm) confirm.value='';
    _encStatus('');
    _encIconState('default');

    passForm.style.display='flex';
    bioSection.style.display='none';

    if(mode==='unlock'){
      title.textContent='Vault Locked';
      sub.textContent='Enter your passphrase to decrypt your notes';
      btnLabel.textContent='Unlock';
      btnIcon.textContent='lock_open';
      confWrap.style.display='none';
      if(strength) strength.style.display='none';
      if(skipBtn) skipBtn.style.display='none';

      // Show biometric button if enrolled
      if(bioIsEnrolled()){
        bioSection.style.display='flex';
        bioLabel.textContent='Unlock with Biometrics';

        // Auto-trigger biometric on unlock
        setTimeout(()=>_doBioUnlock(), 300);
      }
    } else if(mode==='setup'){
      title.textContent='Encrypt Your Vault';
      sub.textContent='Set a passphrase — your notes will be AES-256 encrypted at rest';
      btnLabel.textContent='Enable Encryption';
      btnIcon.textContent='lock';
      confWrap.style.display='block';
      if(strength) strength.style.display='flex';
      if(skipBtn) skipBtn.style.display='block';
    } else if(mode==='migrate'){
      title.textContent='Encrypt Existing Data';
      sub.textContent='Set a passphrase to encrypt your existing notes with AES-256';
      btnLabel.textContent='Encrypt & Continue';
      btnIcon.textContent='lock';
      confWrap.style.display='block';
      if(strength) strength.style.display='flex';
      if(skipBtn) skipBtn.style.display='block';
    } else if(mode==='change'){
      title.textContent='Change Passphrase';
      sub.textContent='Enter a new passphrase — your vault will be re-encrypted';
      btnLabel.textContent='Save New Passphrase';
      btnIcon.textContent='key';
      confWrap.style.display='block';
      if(strength) strength.style.display='flex';
      if(skipBtn) skipBtn.style.display='none';
    }

    // Strength meter
    if(input && strength){
      input.addEventListener('input', ()=>{
        if(mode!=='unlock') _updateStrengthMeter(_passphraseStrength(input.value));
      });
    }

    // Show/hide passphrase
    if(visTgl){
      visTgl.onclick=()=>{
        const isText=input.type==='text';
        input.type=isText?'password':'text';
        if(confirm) confirm.type=isText?'password':'text';
        visTgl.querySelector('.ms').textContent=isText?'visibility':'visibility_off';
      };
    }

    const done=(success)=>{
      lock.classList.add('hiding');
      lock.addEventListener('transitionend',()=>{
        lock.style.display='none';
        lock.classList.remove('hiding');
      },{once:true});
      resolve(success);
      if(onDone) onDone(success);
    };

    /* ── Biometric unlock handler ── */
    async function _doBioUnlock(){
      bioBtn.disabled=true;
      bioBtn.classList.add('bio-pulse');
      _encIconState('pulse');
      _encStatus('Scanning biometrics…');
      try{
        const pass = await bioUnlock();
        await decryptVault(pass);
        _cachePass(pass);
        _encIconState('default');
        _encStatus('Unlocked!','ok');
        setTimeout(()=>done(true),350);
      }catch(e){
        bioBtn.classList.remove('bio-pulse');
        bioBtn.disabled=false;
        _encIconState('error');
        _encStatus(e.message||'Biometric failed — use passphrase','err');
        setTimeout(()=>{ _encIconState('default'); _encStatus(''); },2200);
      }
    }

    if(bioBtn){
      bioBtn.onclick=()=>_doBioUnlock();
    }

    submitBtn.onclick=async()=>{
      const pass=input.value.trim();
      if(!pass){ _encStatus('Passphrase required','err'); input.focus(); return; }

      if(mode==='unlock'){
        _encIconState('pulse');
        _encStatus('Decrypting…');
        submitBtn.disabled=true;
        try{
          await decryptVault(pass);
          // Cache passphrase in session
          _cachePass(pass);
          _encIconState('default');
          _encStatus('Decrypted!','ok');
          setTimeout(()=>done(true),350);
        }catch(e){
          _encIconState('error');
          _encStatus('Wrong passphrase. Try again.','err');
          input.value='';
          input.focus();
          submitBtn.disabled=false;
        }
      } else {
        // setup / migrate / change
        if(pass.length<6){ _encStatus('Minimum 6 characters','err'); return; }
        const conf=confirm?confirm.value.trim():'';
        if(pass!==conf){ _encStatus('Passphrases do not match','err'); confirm.focus(); return; }
        _encIconState('pulse');
        _encStatus('Encrypting vault…');
        submitBtn.disabled=true;
        try{
          if(mode==='change'){
            await changePassphrase(pass);
            _clearCachedPass();
            // Update bio enrollment with new passphrase if enrolled
            if(bioIsEnrolled()){
              try{ await bioEnroll(pass); }catch(e){}
            }
          } else {
            await enableEncryption(pass);
          }
          _encIconState('default');
          _encStatus('Vault encrypted!','ok');
          setTimeout(()=>done(true),400);
        }catch(e){
          _encIconState('error');
          _encStatus('Encryption failed: '+e.message,'err');
          submitBtn.disabled=false;
        }
      }
    };

    // Enter key submit
    [input, confirm].forEach(el=>{
      if(el) el.addEventListener('keydown', e=>{ if(e.key==='Enter') submitBtn.click(); });
    });

    if(skipBtn){ skipBtn.onclick=()=>done(false); }

    setTimeout(()=>{ if(passForm.style.display!=='none') input.focus(); }, 100);
  });
}

function _vaultInit(){
