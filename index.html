    rmNote.style.fontFamily=area.style.fontFamily||`'Comfortaa',sans-serif`;
    rmNote.style.fontSize=area.style.fontSize||'14px';
    rmNote.style.backgroundColor=area.style.backgroundColor||'#faf8f4';
    rmNote.style.backgroundImage=area.style.backgroundImage||'';
    rmNote.style.backgroundSize=area.style.backgroundSize||'';
    rmNote.className=area.className.replace('note-area','').trim();
    rm.classList.add('open');
    rmNote.focus();
    // Sync reading mode → editor on close
    function syncBack(){area.innerHTML=rmNote.innerHTML;rm.classList.remove('open');}
    document.getElementById('rm-close').onclick=syncBack;
  }
  document.getElementById('ne-clear').addEventListener('click',()=>{
    if(confirm('Clear all note content?')){area.innerHTML='';area.focus();}
  });

  function saveNote(){
    const folderId=document.getElementById('ne-folder').value;
    if(!folderId){toast('Select a folder','error');return}
    const title=document.getElementById('ne-title').value.trim()||'Untitled Note';
    // Strip pin marker before saving
    const clone=area.cloneNode(true);
    clone.querySelectorAll('[data-pin="1"]').forEach(m=>m.remove());
    const content=clone.innerHTML;
    const bgSel=document.getElementById('ne-bg-sel').value||'plain';
    const noteFont=document.getElementById('ne-font-sel').value||'Comfortaa';
    const fontSize=parseInt(document.getElementById('ne-font-size').value)||14;
    const bgColor=document.getElementById('ne-bg-color').value||'#faf8f4';
    const pinned=document.getElementById('ne-pin').classList.contains('active');
    if(note){
      note.title=title;note.content=content;note.folderId=folderId;note.bg=bgSel;note.noteFont=noteFont;note.bgColor=bgColor;note.fontSize=fontSize;note.pinned=pinned;
      if(noteCustomBg)note.customBg=noteCustomBg;
    }else{
      S.notes.push({id:uid(),folderId,title,content,bg:bgSel,noteFont,bgColor,fontSize,pinned,customBg:noteCustomBg||'',date:S.selectedDate||today(),createdAt:Date.now()});
    }
    saveS();renderDayPanel();renderCalendar();toast('Note saved','success');closeModal();
  }

  document.getElementById('ne-cancel').addEventListener('click',closeModal);
  document.getElementById('ne-save').addEventListener('click',saveNote);
  if(note){
    document.getElementById('ne-del').addEventListener('click',()=>{if(confirm('Delete note?')){deleteItem('note',note.id);closeModal();}});
    document.getElementById('ne-dup').addEventListener('click',()=>{duplicateItem('note',note.id);closeModal();});
  }else{
    document.getElementById('ne-dup').addEventListener('click',()=>toast('Save first to duplicate','info'));
  }

  // ── Align/list/pin dropdown (body-mounted to escape overflow clipping) ──────
  const alignToggle = document.getElementById('ne-align-toggle');
  // Build menu and mount to body
  const alignMenu = document.createElement('div');
  alignMenu.id = 'ne-align-menu';
  alignMenu.style.cssText = `display:none;position:fixed;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);box-shadow:0 8px 28px var(--shadow);padding:6px;z-index:99999;flex-direction:column;gap:2px;min-width:44px`;
  alignMenu.innerHTML = `
    <button class="fmt-btn ne-align-btn" data-align="justifyLeft" title="Align Left"><span class="ms">format_align_left</span></button>
    <button class="fmt-btn ne-align-btn" data-align="justifyCenter" title="Align Center"><span class="ms">format_align_center</span></button>
    <button class="fmt-btn ne-align-btn" data-align="justifyRight" title="Align Right"><span class="ms">format_align_right</span></button>
    <button class="fmt-btn ne-align-btn" data-align="justifyFull" title="Justify"><span class="ms">format_align_justify</span></button>
    <div style="width:100%;height:1px;background:var(--border2);margin:2px 0;flex-shrink:0"></div>
    <button class="fmt-btn" data-cmd="insertUnorderedList" title="Bullets"><span class="ms">format_list_bulleted</span></button>
    <button class="fmt-btn" data-cmd="insertOrderedList" title="Numbered"><span class="ms">format_list_numbered</span></button>
    <div style="width:100%;height:1px;background:var(--border2);margin:2px 0;flex-shrink:0"></div>
    <button class="fmt-btn${curPinned?' active':''}" id="ne-pin" title="Toggle pin">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="11" stroke="currentColor" stroke-width="1.5"/>
        <path d="M12 7v10M8.5 10.5l3.5-3.5 3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>`;
  document.body.appendChild(alignMenu);

  // ne-pin lives inside alignMenu — wire it up after mount
  const pinBtn = document.getElementById('ne-pin');
  pinBtn.addEventListener('click', e => {
    e.stopPropagation(); // keep menu open
    const on = pinBtn.classList.toggle('active');
    on ? insertPinMarker() : removePinMarker();
  });

  // Wire up buttons inside the menu
  alignMenu.querySelectorAll('.ne-align-btn').forEach(btn=>{
    btn.addEventListener('mousedown',e=>e.preventDefault());
    btn.addEventListener('click',()=>{
      document.execCommand(btn.dataset.align,false,null);
      alignMenu.querySelectorAll('.ne-align-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      area.focus();
    });
  });
  alignMenu.querySelectorAll('.fmt-btn[data-cmd]').forEach(btn=>{
    btn.addEventListener('mousedown',e=>e.preventDefault());
    btn.addEventListener('click',()=>{document.execCommand(btn.dataset.cmd,false,null);area.focus();});
  });

  function openAlignMenu(){
    const r = alignToggle.getBoundingClientRect();
    alignMenu.style.display = 'flex';
    // Position below button, right-aligned
    const mw = alignMenu.offsetWidth||50;
    let left = r.right - mw;
    if(left < 4) left = 4;
    alignMenu.style.top = (r.bottom + 4) + 'px';
    alignMenu.style.left = left + 'px';
    alignToggle.classList.add('active');
  }
  function closeAlignMenu(){
    alignMenu.style.display = 'none';
    alignToggle.classList.remove('active');
  }
  alignToggle.addEventListener('mousedown', e => e.preventDefault());
  alignToggle.addEventListener('click', e => {
    e.stopPropagation();
    alignMenu.style.display === 'flex' ? closeAlignMenu() : openAlignMenu();
  });
  document.addEventListener('click', e => {
    if(!alignMenu.contains(e.target) && e.target !== alignToggle) closeAlignMenu();
  });
  // Clean up menu from body when modal closes
  const _origCloseModal = window._alignMenuCleanup;
  window._alignMenuCleanup = () => { alignMenu.remove(); };
  document.getElementById('ne-dl').addEventListener('click',e=>{
    // Sync live editor state so export reflects what user currently sees
    const liveBg=document.getElementById('ne-bg-sel').value||'plain';
    const liveBgColor=document.getElementById('ne-bg-color').value||'#faf8f4';
    const liveFont=document.getElementById('ne-font-sel').value||'Comfortaa';
    const liveFontSize=parseInt(document.getElementById('ne-font-size').value)||14;
    const livePinned=document.getElementById('ne-pin').classList.contains('active');
    const liveContent=document.getElementById('ne-content').innerHTML;
    const liveTitle=document.getElementById('ne-title').value.trim()||'Untitled Note';
    if(note){
      note.bg=liveBg;note.bgColor=liveBgColor;note.noteFont=liveFont;note.fontSize=liveFontSize;note.pinned=livePinned;
      note.content=liveContent;note.title=liveTitle;
      if(noteCustomBg)note.customBg=noteCustomBg;
    }
    openExportMenu('note',note?.id,'download',e.currentTarget);
  });
}

/* ═══════════════════════════════════════════════
   TODO EDITOR
═══════════════════════════════════════════════ */
function openTodoEditor(id){
  if(!checkFolders()&&!id)return;
  const todo=id?S.todos.find(t=>t.id===id):null;
  const items=todo?JSON.parse(JSON.stringify(todo.items)):[];
  let itemsHtml=items.map((it,i)=>todoItemHtml(it,i)).join('');

  openModal(`
    <div class="editor-layout">
      <div class="editor-meta">
        <span style="font-size:12px;font-weight:600;color:var(--text3)">Folder</span>
        <select class="form-select" id="td-folder">${folderSelect(todo?todo.folderId:S.folders[0]?.id)}</select>
      </div>
      <div class="editor-topbar">
        <button class="ibtn" id="td-cancel" title="Cancel"><span class="ms">close</span></button>
        <input class="editor-title-input" id="td-title" placeholder="To-Do list title…" value="${todo?todo.title:''}">
        <button class="ibtn" id="td-dup" title="Duplicate"><span class="ms">content_copy</span></button>
        <button class="ibtn" id="td-share" title="Share"><span class="ms">ios_share</span></button>
        <button class="ibtn" id="td-dl" title="Download"><span class="ms">download</span></button>
        ${todo?`<button class="ibtn danger" id="td-del" title="Delete"><span class="ms">delete</span></button>`:''}
        <button class="ibtn accent" id="td-save" title="Save"><span class="ms">check</span></button>
      </div>
      <div class="todo-list" id="todo-list">${itemsHtml}</div>
      <button class="add-todo-btn" id="add-todo-row" title="Add item"><span class="ms">add</span></button>
    </div>`,
  'modal modal-full');

  document.getElementById('add-todo-row').addEventListener('click',()=>addTodoItem());
  document.getElementById('td-cancel').addEventListener('click',closeModal);
  document.getElementById('td-save').addEventListener('click',saveTodo);
  if(todo){
    document.getElementById('td-del').addEventListener('click',()=>{if(confirm('Delete to-do?')){deleteItem('todo',todo.id);closeModal();}});
    document.getElementById('td-dup').addEventListener('click',()=>{duplicateItem('todo',todo.id);closeModal();});
  }else{
    document.getElementById('td-dup').addEventListener('click',()=>toast('Save first to duplicate','info'));
  }
  document.getElementById('td-share').addEventListener('click',e=>openExportMenu('todo',todo?.id,'share',e.currentTarget));
  document.getElementById('td-dl').addEventListener('click',e=>openExportMenu('todo',todo?.id,'download',e.currentTarget));
  setupTodoListeners();

  function addTodoItem(){
    const list=document.getElementById('todo-list');
    const idx=list.children.length;
    const it={id:uid(),text:'',done:false};
    list.insertAdjacentHTML('beforeend',todoItemHtml(it,idx));
    setupTodoListeners();
    list.lastElementChild.querySelector('.todo-text').focus();
  }
  function saveTodo(){
    const folderId=document.getElementById('td-folder').value;
    if(!folderId){toast('Select a folder','error');return}
    const title=document.getElementById('td-title').value.trim()||'Untitled To-Do';
    const rows=[...document.querySelectorAll('.todo-item')];
    const newItems=rows.map(r=>({id:r.dataset.id,text:r.querySelector('.todo-text').value,done:r.querySelector('.todo-check').classList.contains('done')}));
    if(todo){todo.title=title;todo.folderId=folderId;todo.items=newItems;}
    else{S.todos.push({id:uid(),folderId,title,items:newItems,date:S.selectedDate||today(),createdAt:Date.now()});}
    saveS();renderDayPanel();renderCalendar();toast('To-Do saved','success');closeModal();
  }
}
function todoItemHtml(it,i){
  return`<div class="todo-item" data-id="${it.id}">
    <button class="todo-check${it.done?' done':''}" title="Toggle"><span class="ms">check</span></button>
    <input class="todo-text${it.done?' done-text':''}" value="${it.text||''}" placeholder="Task item…">
    <button class="todo-del" title="Remove"><span class="ms">close</span></button>
  </div>`;
}
function setupTodoListeners(){
  document.querySelectorAll('.todo-check').forEach(btn=>{
    btn.onclick=function(){
      this.classList.toggle('done');
      const inp=this.nextElementSibling;
      if(inp)inp.classList.toggle('done-text',this.classList.contains('done'));
    };
  });
  document.querySelectorAll('.todo-del').forEach(btn=>{btn.onclick=function(){this.closest('.todo-item').remove()}});
  document.querySelectorAll('.todo-text').forEach(inp=>{
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter'){e.preventDefault();document.getElementById('add-todo-row').click();}
    });
  });
}

/* ═══════════════════════════════════════════════
   TABLE EDITOR
═══════════════════════════════════════════════ */
function openTableEditor(id){
  if(!checkFolders()&&!id)return;
  const tbl=id?S.tables.find(t=>t.id===id):null;
  let tableData=tbl?JSON.parse(JSON.stringify(tbl.data)):[
    ['Column A','Column B','Column C'],
    ['','',''],['','','']
  ];

  openModal(`
    <div class="editor-layout">
      <div class="editor-meta">
        <span style="font-size:12px;font-weight:600;color:var(--text3)">Folder</span>
        <select class="form-select" id="tb-folder">${folderSelect(tbl?tbl.folderId:S.folders[0]?.id)}</select>
      </div>
      <div class="editor-topbar">
        <button class="ibtn" id="tb-cancel" title="Cancel"><span class="ms">close</span></button>
        <input class="editor-title-input" id="tb-title" placeholder="Table title…" value="${tbl?tbl.title:''}">
        <button class="ibtn" id="tb-dup" title="Duplicate"><span class="ms">content_copy</span></button>
        <button class="ibtn" id="tb-share" title="Share"><span class="ms">ios_share</span></button>
        <button class="ibtn" id="tb-dl" title="Download"><span class="ms">download</span></button>
        ${tbl?`<button class="ibtn danger" id="tb-del" title="Delete"><span class="ms">delete</span></button>`:''}
        <button class="ibtn accent" id="tb-save" title="Save"><span class="ms">check</span></button>
      </div>
      <div class="table-toolbar">
        <button class="btn ghost" id="tb-add-row"><span class="ms">add</span>Row</button>
        <button class="btn ghost" id="tb-del-row"><span class="ms">remove</span>Row</button>
        <button class="btn ghost" id="tb-add-col"><span class="ms">add</span>Col</button>
        <button class="btn ghost" id="tb-del-col"><span class="ms">remove</span>Col</button>
        <div style="width:1px;height:24px;background:var(--border2);margin:0 2px;flex-shrink:0"></div>
        <button class="btn ghost" id="tb-bold" title="Bold"><span class="ms">format_bold</span></button>
        <button class="btn ghost" id="tb-italic" title="Italic"><span class="ms">format_italic</span></button>
        <button class="btn ghost" id="tb-underline" title="Underline"><span class="ms">format_underlined</span></button>
        <button class="btn ghost" id="tb-align-l" title="Left"><span class="ms">format_align_left</span></button>
        <button class="btn ghost" id="tb-align-c" title="Center"><span class="ms">format_align_center</span></button>
        <button class="btn ghost" id="tb-align-r" title="Right"><span class="ms">format_align_right</span></button>
        <div style="width:1px;height:24px;background:var(--border2);margin:0 2px;flex-shrink:0"></div>
        <select class="col-resize-select" id="tb-col-w">
          <option value="">W: Auto</option>
          <option value="60px">60px</option><option value="80px">80px</option>
          <option value="100px">100px</option><option value="120px">120px</option>
          <option value="150px">150px</option><option value="200px">200px</option>
        </select>
        <select class="col-resize-select" id="tb-row-h">
          <option value="">H: Auto</option>
          <option value="32px">32px</option><option value="40px">40px</option>
          <option value="48px">48px</option><option value="60px">60px</option>
        </select>
      </div>
      <div class="table-wrap" id="table-wrap"></div>
    </div>`,
  'modal modal-full');

  function renderTable(){
    const wrap=document.getElementById('table-wrap');
    if(!tableData||!tableData.length){wrap.innerHTML='<p style="color:var(--text3);padding:20px">Empty table</p>';return}
    const rows=tableData.length;const cols=tableData[0]?.length||0;
    let html=`<table class="data-table"><thead><tr><th class="row-num">#</th>`;
    for(let c=0;c<cols;c++)html+=`<th contenteditable="true" data-r="0" data-c="${c}" spellcheck="false">${tableData[0][c]||''}</th>`;
    html+=`</tr></thead><tbody>`;
    for(let r=1;r<rows;r++){
      html+=`<tr><td class="row-num">${r}</td>`;
      for(let c=0;c<cols;c++)html+=`<td contenteditable="true" data-r="${r}" data-c="${c}" spellcheck="false">${tableData[r]?.[c]||''}</td>`;
      html+=`</tr>`;
    }
    html+=`</tbody></table>`;
    wrap.innerHTML=html;
    wrap.querySelectorAll('[contenteditable][data-r]').forEach(cell=>{
      cell.addEventListener('blur',()=>{
        const r=+cell.dataset.r,c=+cell.dataset.c;
        if(!tableData[r])tableData[r]=[];
        tableData[r][c]=cell.textContent;
      });
      cell.addEventListener('keydown',e=>{
        if(e.key==='Tab'){e.preventDefault();const cells=[...wrap.querySelectorAll('[contenteditable][data-r]')];const idx=cells.indexOf(cell);if(idx+1<cells.length)cells[idx+1].focus();}
      });
    });
  }
  renderTable();

  document.getElementById('tb-add-row').addEventListener('click',()=>{
    const cols=tableData[0]?.length||3;tableData.push(new Array(cols).fill(''));renderTable();
  });
  document.getElementById('tb-del-row').addEventListener('click',()=>{if(tableData.length>1)tableData.pop();renderTable();});
  document.getElementById('tb-add-col').addEventListener('click',()=>{tableData=tableData.map(r=>[...r,'']);renderTable();});
  document.getElementById('tb-del-col').addEventListener('click',()=>{if((tableData[0]?.length||0)>1)tableData=tableData.map(r=>r.slice(0,-1));renderTable();});

  function tableFmt(cmd){const focused=document.querySelector('.data-table [contenteditable]:focus');if(focused){document.execCommand(cmd,false,null);}}
  ['bold','italic','underline'].forEach(cmd=>{
    const id={'bold':'tb-bold','italic':'tb-italic','underline':'tb-underline'}[cmd];
    document.getElementById(id).addEventListener('click',()=>tableFmt(cmd));
  });
  ['l','c','r'].forEach(dir=>{
    const map={l:'justifyLeft',c:'justifyCenter',r:'justifyRight'};
    document.getElementById(`tb-align-${dir}`).addEventListener('click',()=>tableFmt(map[dir]));
  });
  document.getElementById('tb-col-w').addEventListener('change',e=>{
    const w=e.target.value;
    document.querySelectorAll('.data-table th:not(.row-num),.data-table td:not(.row-num)').forEach(cell=>{cell.style.width=w||'';cell.style.minWidth=w||'90px';});
  });
  document.getElementById('tb-row-h').addEventListener('change',e=>{
    const h=e.target.value;document.querySelectorAll('.data-table tr').forEach(row=>{row.style.height=h||'';});
  });

  function syncTableFromDom(){
    document.querySelectorAll('[contenteditable][data-r]').forEach(cell=>{
      const r=+cell.dataset.r,c=+cell.dataset.c;if(!tableData[r])tableData[r]=[];tableData[r][c]=cell.textContent;
    });
  }
  function saveTable(){
    syncTableFromDom();
    const folderId=document.getElementById('tb-folder').value;
    if(!folderId){toast('Select a folder','error');return}
    const title=document.getElementById('tb-title').value.trim()||'Untitled Table';
    if(tbl){tbl.title=title;tbl.folderId=folderId;tbl.data=tableData;}
    else{S.tables.push({id:uid(),folderId,title,data:tableData,date:S.selectedDate||today(),createdAt:Date.now()});}
    saveS();renderDayPanel();renderCalendar();toast('Table saved','success');closeModal();
  }
  document.getElementById('tb-cancel').addEventListener('click',closeModal);
  document.getElementById('tb-save').addEventListener('click',saveTable);
  if(tbl){
    document.getElementById('tb-del').addEventListener('click',()=>{if(confirm('Delete table?')){deleteItem('table',tbl.id);closeModal();}});
    document.getElementById('tb-dup').addEventListener('click',()=>{duplicateItem('table',tbl.id);closeModal();});
  }else{
    document.getElementById('tb-dup').addEventListener('click',()=>toast('Save first to duplicate','info'));
  }
  document.getElementById('tb-share').addEventListener('click',e=>{syncTableFromDom();openExportMenu('table',tbl?.id,'share',e.currentTarget,tableData)});
  document.getElementById('tb-dl').addEventListener('click',e=>{syncTableFromDom();openExportMenu('table',tbl?.id,'download',e.currentTarget,tableData)});
}

/* ═══════════════════════════════════════════════
   OPEN EDITOR DISPATCH
═══════════════════════════════════════════════ */
function openEditor(type,id){
  if(type==='note')openNoteEditor(id);
  else if(type==='todo')openTodoEditor(id);
  else if(type==='table')openTableEditor(id);
}

/* ═══════════════════════════════════════════════
   CRUD OPERATIONS
═══════════════════════════════════════════════ */
function deleteItem(type,id){
  if(type==='note')S.notes=S.notes.filter(n=>n.id!==id);
  else if(type==='todo')S.todos=S.todos.filter(t=>t.id!==id);
  else if(type==='table')S.tables=S.tables.filter(t=>t.id!==id);
  saveS();renderDayPanel();renderCalendar();toast('Deleted','success');
}
function duplicateItem(type,id){
  if(type==='note'){const n=S.notes.find(n=>n.id===id);if(n)S.notes.push({...JSON.parse(JSON.stringify(n)),id:uid(),title:'Copy of '+n.title,createdAt:Date.now()});}
  else if(type==='todo'){const t=S.todos.find(t=>t.id===id);if(t)S.todos.push({...JSON.parse(JSON.stringify(t)),id:uid(),title:'Copy of '+t.title,createdAt:Date.now()});}
  else if(type==='table'){const t=S.tables.find(t=>t.id===id);if(t)S.tables.push({...JSON.parse(JSON.stringify(t)),id:uid(),title:'Copy of '+t.title,createdAt:Date.now()});}
  saveS();renderDayPanel();renderCalendar();toast('Duplicated','success');
}
function deleteFolder(id){
  if(!confirm('Delete folder and all its items?'))return;
  S.folders=S.folders.filter(f=>f.id!==id);
  S.notes=S.notes.filter(n=>n.folderId!==id);
  S.todos=S.todos.filter(t=>t.folderId!==id);
  S.tables=S.tables.filter(t=>t.folderId!==id);
  saveS();renderDayPanel();renderCalendar();toast('Folder deleted','success');
}
function duplicateFolder(id){
  const f=S.folders.find(f=>f.id===id);if(!f)return;
  const newId=uid();
  S.folders.push({...f,id:newId,name:'Copy of '+f.name,createdAt:Date.now()});
  S.notes.filter(n=>n.folderId===id).forEach(n=>S.notes.push({...JSON.parse(JSON.stringify(n)),id:uid(),folderId:newId,createdAt:Date.now()}));
  S.todos.filter(t=>t.folderId===id).forEach(t=>S.todos.push({...JSON.parse(JSON.stringify(t)),id:uid(),folderId:newId,createdAt:Date.now()}));
  S.tables.filter(t=>t.folderId===id).forEach(t=>S.tables.push({...JSON.parse(JSON.stringify(t)),id:uid(),folderId:newId,createdAt:Date.now()}));
  saveS();toast('Folder duplicated','success');
}

/* ═══════════════════════════════════════════════
   FOLDERS VIEW
═══════════════════════════════════════════════ */
function openFoldersView(){
  openModal(`
    <div class="editor-layout" style="height:100%">
      <div class="modal-head">
        <button class="ibtn" id="fv-close"><span class="ms">close</span></button>
        <h2>All Folders</h2>
        <button class="ibtn accent" id="fv-new" title="New Folder"><span class="ms">create_new_folder</span></button>
      </div>
      <div class="folders-controls">
        <select class="form-select" id="fv-sort">
          <option value="name-asc"${S.foldersSort==='name-asc'?' selected':''}>A → Z</option>
          <option value="name-desc"${S.foldersSort==='name-desc'?' selected':''}>Z → A</option>
          <option value="oldest"${S.foldersSort==='oldest'?' selected':''}>Oldest First</option>
          <option value="newest"${S.foldersSort==='newest'?' selected':''}>Newest First</option>
        </select>
        <div class="view-toggle">
          <button class="vt-btn${S.foldersView==='grid'?' active':''}" data-view="grid"><span class="ms">grid_view</span></button>
          <button class="vt-btn${S.foldersView==='list'?' active':''}" data-view="list"><span class="ms">view_list</span></button>
          <button class="vt-btn${S.foldersView==='compact'?' active':''}" data-view="compact"><span class="ms">density_small</span></button>
        </div>
      </div>
      <div id="folders-grid" class="${S.foldersView==='list'?'list-view':S.foldersView==='compact'?'compact-view':''}"></div>
    </div>`,
  'modal modal-full');

  renderFolderCards();
  document.getElementById('fv-close').addEventListener('click',closeModal);
  document.getElementById('fv-new').addEventListener('click',()=>{
    overlay.classList.remove('show');modalRoot.innerHTML='';
    requestAnimationFrame(()=>openFolderModal(null,openFoldersView));
  });
  document.getElementById('fv-sort').addEventListener('change',e=>{S.foldersSort=e.target.value;saveS();renderFolderCards();});
  document.querySelectorAll('.vt-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      S.foldersView=btn.dataset.view;saveS();
      document.querySelectorAll('.vt-btn').forEach(b=>b.classList.toggle('active',b===btn));
      const grid=document.getElementById('folders-grid');
      grid.className=S.foldersView==='list'?'list-view':S.foldersView==='compact'?'compact-view':'';
      renderFolderCards();
    });
  });
}

function sortedFolders(){
  const fols=[...S.folders];
  if(S.foldersSort==='name-asc')fols.sort((a,b)=>a.name.localeCompare(b.name));
  else if(S.foldersSort==='name-desc')fols.sort((a,b)=>b.name.localeCompare(a.name));
  else if(S.foldersSort==='oldest')fols.sort((a,b)=>a.createdAt-b.createdAt);
  else fols.sort((a,b)=>b.createdAt-a.createdAt);
  return fols;
}
function getFolderItemCount(fid){
  return S.notes.filter(n=>n.folderId===fid).length+S.todos.filter(t=>t.folderId===fid).length+S.tables.filter(t=>t.folderId===fid).length;
}
function renderFolderCards(){
  const grid=document.getElementById('folders-grid');
  const fols=sortedFolders();
  if(!fols.length){grid.innerHTML=`<div class="empty-state" style="width:100%"><span class="ms">folder_open</span><p>No folders yet. Create one!</p></div>`;return}
  const v=S.foldersView;
  const createdStr=(f)=>f.createdAt?new Date(f.createdAt).toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'}):'';
  grid.innerHTML=fols.map(f=>{
    const cnt=getFolderItemCount(f.id);
    if(v==='grid'){
      return`<div class="folder-card" data-fid="${f.id}">
        <div class="folder-card-top">

      openFolderItems(el.dataset.fid);

function openFolderItems(fid){

  const tables=S.tables.filter(t=>t.folderId===fid).map(t=>({...t,type:'table'}));
  const all=[...notes,...todos,...tables].sort((a,b)=>a.createdAt-b.createdAt);

  openModal(`

        <button class="ibtn" id="fi-back"><span class="ms">arrow_back</span></button>

      <div id="folder-items-list">

          <div class="folder-item-row" data-type="${it.type}" data-id="${it.id}">
            <div class="item-type-icon" style="width:36px;height:36px"><span class="ms">${typeIcon(it.type)}</span></div>
            <div style="flex:1;min-width:0">
              <div style="font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${it.title||'Untitled'}</div>

              <button class="act-btn" data-action="edit" data-type="${it.type}" data-id="${it.id}"><span class="ms">edit</span></button>
              <button class="act-btn" data-action="duplicate" data-type="${it.type}" data-id="${it.id}"><span class="ms">content_copy</span></button>

            </div>

        :`<div class="empty-state"><span class="ms">inventory_2</span><p>No items in this folder yet.</p></div>`}
      </div>

  document.getElementById('fi-back').addEventListener('click',()=>{

  document.getElementById('fi-new-note').addEventListener('click',()=>{
    overlay.classList.remove('show');modalRoot.innerHTML='';
    S.selectedDate=S.selectedDate||today();
    requestAnimationFrame(()=>openNoteEditor());
  });
  document.getElementById('fi-new-todo').addEventListener('click',()=>{
    overlay.classList.remove('show');modalRoot.innerHTML='';
    S.selectedDate=S.selectedDate||today();
    requestAnimationFrame(()=>openTodoEditor());
  });
  document.getElementById('fi-new-table').addEventListener('click',()=>{
    overlay.classList.remove('show');modalRoot.innerHTML='';
    S.selectedDate=S.selectedDate||today();
    requestAnimationFrame(()=>openTableEditor());
  });
  document.querySelectorAll('[data-action]').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const{action,type,id}=btn.dataset;

        requestAnimationFrame(()=>openEditor(type,id));
      } else if(action==='duplicate'){

  document.querySelectorAll('.folder-item-row').forEach((row,i)=>{

function openSearch(){
  openModal(`
    <div class="editor-layout" style="height:100%">
      <div class="search-input-wrap">
        <span class="ms">search</span>
        <input type="text" id="search-input" placeholder="Search everything…" autofocus>
        <button class="ibtn" id="search-close"><span class="ms">close</span></button>
      </div>
      <div id="search-results"><div class="search-empty"><span class="ms">search</span><p>Start typing to search</p></div></div>
    </div>`,
  'modal modal-full');

  document.getElementById('search-close').addEventListener('click',()=>{closeModal();setNavActive('nav-home');});
  document.getElementById('search-input').addEventListener('input',e=>doSearch(e.target.value));
  document.getElementById('search-input').focus();
}
function doSearch(q){
  q=q.toLowerCase().trim();
  const res=document.getElementById('search-results');
  if(!q){res.innerHTML=`<div class="search-empty"><span class="ms">search</span><p>Start typing to search</p></div>`;return}
  const folders=S.folders.filter(f=>f.name.toLowerCase().includes(q));
  const notes=S.notes.filter(n=>n.title?.toLowerCase().includes(q)||n.content?.toLowerCase().includes(q));
  const todos=S.todos.filter(t=>t.title?.toLowerCase().includes(q)||t.items?.some(i=>i.text?.toLowerCase().includes(q)));
  const tables=S.tables.filter(t=>t.title?.toLowerCase().includes(q));

  if(!folders.length&&!notes.length&&!todos.length&&!tables.length){
    res.innerHTML=`<div class="search-empty"><span class="ms">search_off</span><p>No results for "<strong>${q}</strong>"</p></div>`;return;
  }
  let html='';
  if(folders.length){
    html+=`<div class="search-group-title">Folders</div>`;
    html+=folders.map(f=>`<div class="search-result-item" data-type="folder" data-id="${f.id}">
      <div class="search-result-icon" style="background:${f.color}20"><span class="ms" style="color:${f.color}">folder</span></div>
      <div class="search-result-info"><div class="search-result-title">${f.name}</div><div class="search-result-sub">${getFolderItemCount(f.id)} items</div></div>
    </div>`).join('');
  }
  if(notes.length){
    html+=`<div class="search-group-title">Notes</div>`;
    html+=notes.map(n=>{const f=getFolderById(n.folderId);return`<div class="search-result-item" data-type="note" data-id="${n.id}">
      <div class="search-result-icon"><span class="ms">note</span></div>
      <div class="search-result-info"><div class="search-result-title">${n.title||'Untitled'}</div><div class="search-result-sub">${f?f.name:'—'} • ${fmtDate(n.date)}</div></div>
    </div>`}).join('');
  }
  if(todos.length){
    html+=`<div class="search-group-title">To-Do Lists</div>`;
    html+=todos.map(t=>{const f=getFolderById(t.folderId);return`<div class="search-result-item" data-type="todo" data-id="${t.id}">
      <div class="search-result-icon"><span class="ms">checklist</span></div>
      <div class="search-result-info"><div class="search-result-title">${t.title||'Untitled'}</div><div class="search-result-sub">${f?f.name:'—'} • ${fmtDate(t.date)}</div></div>
    </div>`}).join('');
  }
  if(tables.length){
    html+=`<div class="search-group-title">Tables</div>`;
    html+=tables.map(t=>{const f=getFolderById(t.folderId);return`<div class="search-result-item" data-type="table" data-id="${t.id}">
      <div class="search-result-icon"><span class="ms">table_chart</span></div>
      <div class="search-result-info"><div class="search-result-title">${t.title||'Untitled'}</div><div class="search-result-sub">${f?f.name:'—'} • ${fmtDate(t.date)}</div></div>
    </div>`}).join('');
  }
  res.innerHTML=html;
  res.querySelectorAll('.search-result-item').forEach((el,i)=>{
    el.style.animationDelay=`${i*35}ms`;
    el.addEventListener('click',()=>{
      const{type,id}=el.dataset;
      closeModal();setNavActive('nav-home');
      if(type==='folder')openFolderItems(id);
      else{
        const item=[...S.notes,...S.todos,...S.tables].find(i=>i.id===id);
        if(item){S.selectedDate=item.date;const[y,m]=item.date.split('-');S.calYear=+y;S.calMonth=+m-1;renderCalendar();renderDayPanel();document.getElementById('day-panel').classList.add('open');openEditor(type,id);}
      }
    });
  });
}

/* ═══════════════════════════════════════════════
   EXPORT / SHARE / DOWNLOAD
═══════════════════════════════════════════════ */
function getItemContent(type,id){
  if(type==='note'){const n=S.notes.find(n=>n.id===id);if(!n)return null;return{title:n.title,text:n.content?.replace(/<[^>]+>/g,'')||''}}
  if(type==='todo'){const t=S.todos.find(t=>t.id===id);if(!t)return null;return{title:t.title,text:(t.items||[]).map(i=>(i.done?'✓ ':'☐ ')+i.text).join('\n')}}
  if(type==='table'){const t=S.tables.find(t=>t.id===id);if(!t)return null;return{title:t.title,text:(t.data||[]).map(r=>r.join('\t')).join('\n'),data:t.data}}
  return null;
}
function openExportMenu(type,id,mode,anchorEl,tableDataArg){
  const canXlsx=type==='table';
  const itemLabel=mode==='share'?'Share':'Download';
  const html=`
    <div class="dropdown-item" data-export="text"><span class="ms">text_snippet</span>${itemLabel} as Text</div>
    <div class="dropdown-item" data-export="image"><span class="ms">image</span>${itemLabel} as Image</div>
    <div class="dropdown-item" data-export="pdf"><span class="ms">picture_as_pdf</span>${itemLabel} as PDF</div>
    ${canXlsx?`<div class="dropdown-sep"></div><div class="dropdown-item" data-export="xlsx"><span class="ms">table_chart</span>${itemLabel} as Spreadsheet</div>`:''}
  `;
  const dd=anchorEl?openDropdown(html,anchorEl):openDropdown(html,document.getElementById('btn-folders'));
  dd.querySelectorAll('[data-export]').forEach(el=>{
    el.addEventListener('click',()=>{
      closeDropdown();
      const fmt=el.dataset.export;
      if(fmt==='text')exportText(type,id,mode);
      else if(fmt==='image')exportImage(type,id,mode);
      else if(fmt==='pdf')exportPDF(type,id,mode);
      else if(fmt==='xlsx')exportXLSX(type,id,tableDataArg);
    });
  });
}
function exportText(type,id,mode){
  const c=getItemContent(type,id);if(!c)return;
  // Strip HTML to plain text
  const tmp=document.createElement('div');tmp.innerHTML=c.text;
  const plain=tmp.innerText||tmp.textContent||'';
  const text=`${c.title}\n${'─'.repeat(40)}\n${plain}`;
  if(mode==='share'&&navigator.share){navigator.share({title:c.title,text});return;}
  const blob=new Blob([text],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${c.title||'noical'}.txt`;a.click();
  toast('Downloaded as text','success');
}
function exportPDF(type,id,mode){
  const c=getItemContent(type,id);if(!c)return;
  try{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF();
    doc.setFont('helvetica','bold');doc.setFontSize(18);doc.text(c.title||'Untitled',20,25);
    let yOff=40;
    if(type==='note'){const n=S.notes.find(n=>n.id===id);if(n&&n.pinned){doc.setFillColor(0,0,0);doc.circle(105,yOff-4,2,'F');yOff+=10;}}
    doc.setFont('helvetica','normal');doc.setFontSize(11);
    const lines=doc.splitTextToSize(c.text,170);doc.text(lines,20,yOff);
    if(mode==='share'){const uri=doc.output('datauristring');window.open(uri,'_blank');}
    else doc.save(`${c.title||'noical'}.pdf`);
    toast('PDF ready','success');
  }catch(e){toast('PDF error','error');}
}
function exportXLSX(type,id,data){
  let d=data;
  if(!d){const t=S.tables.find(t=>t.id===id);if(!t)return;d=t.data;}
  try{
    const wb=window.XLSX.utils.book_new();
    const ws=window.XLSX.utils.aoa_to_sheet(d||[[]]);
    const t=S.tables.find(t=>t.id===id);
    window.XLSX.utils.book_append_sheet(wb,ws,'Sheet1');
    window.XLSX.writeFile(wb,`${t?.title||'table'}.xlsx`);
    toast('Downloaded as .xlsx','success');
  }catch(e){toast('XLSX error','error');}
}
function exportImage(type,id,mode){
  toast('Preparing image…');
  const c=getItemContent(type,id);if(!c)return;
  const note=type==='note'?S.notes.find(n=>n.id===id):null;

  const PAD=40;const LH=32;const W=700;const SC=2;
  const bgColor=note?.bgColor||'#faf8f4';
  const noteFont=note?.noteFont?`'${note.noteFont}',sans-serif`:'sans-serif';
  const textColor='#1a1a2e';
  const bg=note?.bg||'plain';

  // Build content div (transparent bg — background drawn manually on canvas)
  const tmp=document.createElement('div');
  tmp.style.cssText=`position:fixed;left:-9999px;top:-9999px;width:${W}px;padding:${PAD}px;box-sizing:border-box;background:transparent;`;
  const contentHtml=(()=>{
    if(type!=='note')return`<pre style="white-space:pre-wrap;margin:0">${c.text}</pre>`;
    if(!note)return'';
    const _tmp=document.createElement('div');
    _tmp.innerHTML=note.content;
    _tmp.querySelectorAll('[data-pin="1"]').forEach(m=>m.remove());
    return _tmp.innerHTML;
  })();
  const pinHtml=(()=>{
    if(!note||!note.pinned)return'';
    const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const MONS=['January','February','March','April','May','June','July','August','September','October','November','December'];
    const ref=note.date||today();
    const [y,m,d]=ref.split('-').map(Number);
    const dt=new Date(y,m-1,d);
    const dateStr=`${d} ${MONS[m-1]}, ${y}`;
    const cr=note.createdAt?new Date(note.createdAt):new Date();
    let h=cr.getHours(),mi=cr.getMinutes(),ampm=h>=12?'PM':'AM';
    h=h%12||12;
    const timeStr=`${String(h).padStart(2,'0')}:${String(mi).padStart(2,'0')} ${ampm}`;
    const dayTime=`${DAYS[dt.getDay()]}, ${timeStr}`;
    const dateBlock=`<div style="text-align:center;font-family:${noteFont};line-height:1.5;white-space:nowrap;"><div style="font-size:13px;font-weight:700;letter-spacing:-.2px;">${dateStr}</div><div style="font-size:11px;opacity:0.65;">${dayTime}</div></div>`;
    const pinSvg=`<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;"><path d="M16 3H8l1 5-4 3h4v9l3-3 3 3v-9h4l-4-3 1-5z" fill="rgba(224,0,0,1)" stroke="rgba(160,0,0,1)" stroke-width="0.8"/></svg>`;
    return `<table style="width:100%;border-collapse:collapse;margin-top:-8px;margin-bottom:4px;"><tr><td style="width:50%;font-size:0;line-height:0;color:transparent;"></td><td style="text-align:center;vertical-align:middle;padding:0;">${pinSvg}</td><td style="width:50%;vertical-align:middle;padding-left:6px;">${dateBlock}</td></tr></table>`;
  })();

  tmp.innerHTML=
    `<h2 style="font-size:20px;font-weight:700;color:${textColor};font-family:${noteFont};`+
    `line-height:${LH}px;margin:0 0 ${LH}px 0;padding:0;">${c.title||'Untitled'}</h2>`+
    `${pinHtml}<div style="font-size:14px;line-height:${LH}px;color:${textColor};font-family:${noteFont};margin:0;padding:0;">${contentHtml}</div>`;
  document.body.appendChild(tmp);

  function compose(bgCanvas){
    html2canvas(tmp,{scale:SC,useCORS:true,logging:false,backgroundColor:null}).then(contentCanvas=>{
      tmp.remove();
      // Final canvas matches content size
      const final=document.createElement('canvas');
      final.width=contentCanvas.width;
      final.height=contentCanvas.height;
      const ctx=final.getContext('2d');
      // Draw background
      if(bgCanvas){
        // tile the pattern canvas
        const pat=ctx.createPattern(bgCanvas,'repeat');
        ctx.fillStyle=pat;
        ctx.fillRect(0,0,final.width,final.height);
      }else{
        ctx.fillStyle=bgColor;
        ctx.fillRect(0,0,final.width,final.height);
      }
      // Draw sheet pattern lines via Canvas 2D
      ctx.save();
      if(bg==='ruled'){
        ctx.strokeStyle='#c0ccde';ctx.lineWidth=SC;
        for(let y=(PAD+LH)*SC;y<final.height;y+=LH*SC){
          ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(final.width,y);ctx.stroke();
        }
      }else if(bg==='square'){
        ctx.strokeStyle='#ccd4e4';ctx.lineWidth=SC;
        for(let y=PAD*SC;y<final.height;y+=LH*SC){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(final.width,y);ctx.stroke();}
        for(let x=PAD*SC;x<final.width;x+=LH*SC){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,final.height);ctx.stroke();}
      }else if(bg==='dotted'){
        ctx.fillStyle='#b0bcd4';
        const gap=24*SC;
        for(let y=PAD*SC;y<final.height;y+=gap){
          for(let x=PAD*SC;x<final.width;x+=gap){
            ctx.beginPath();ctx.arc(x,y,1.5*SC,0,Math.PI*2);ctx.fill();
          }
        }
      }
      ctx.restore();
      // Composite text content on top
      ctx.drawImage(contentCanvas,0,0);
      final.toBlob(blob=>{
        const a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download=`${c.title||'noical'}.png`;
        a.click();
        toast('Downloaded as image','success');
      });
    }).catch(()=>{tmp.remove();toast('Image export error','error');});
  }

  // For custom bg image: load it onto an offscreen canvas first
  if(bg==='custom'&&note?.customBg){
    const img=new Image();
    img.onload=()=>{
      const bc=document.createElement('canvas');
      bc.width=W*SC;bc.height=1; // height will be overridden — use plain fill instead
      const bx=bc.getContext('2d');
      // We'll just draw the image directly in compose via a flag
      // Instead: store img reference and draw in compose
      html2canvas(tmp,{scale:SC,useCORS:true,logging:false,backgroundColor:null}).then(contentCanvas=>{
        tmp.remove();
        const final=document.createElement('canvas');
        final.width=contentCanvas.width;final.height=contentCanvas.height;
        const ctx=final.getContext('2d');
        ctx.drawImage(img,0,0,final.width,final.height);
        ctx.drawImage(contentCanvas,0,0);
        final.toBlob(blob=>{
          const a=document.createElement('a');a.href=URL.createObjectURL(blob);
          a.download=`${c.title||'noical'}.png`;a.click();
          toast('Downloaded as image','success');
        });
      }).catch(()=>{tmp.remove();toast('Image export error','error');});
    };
    img.onerror=()=>compose(null);
    img.src=note.customBg;
  }else{
    compose(null);
  }
}

/* ═══════════════════════════════════════════════
   EVENT SETUP
═══════════════════════════════════════════════ */
function setupEvents(){
  // Stub home btn (hidden, used by JS elsewhere)
  document.getElementById('btn-home').addEventListener('click',()=>goHome());

  // Calendar nav
  document.getElementById('month-sel').addEventListener('change',e=>{
    const prev=S.calMonth;S.calMonth=+e.target.value;
    renderCalendar(S.calMonth>prev?'right':'left');
  });
  document.getElementById('year-sel').addEventListener('change',e=>{
    const prev=S.calYear;S.calYear=+e.target.value;
    renderCalendar(S.calYear>prev?'right':'left');
  });
  document.getElementById('today-btn').addEventListener('click',()=>{const n=new Date();S.calYear=n.getFullYear();S.calMonth=n.getMonth();selectDate(today())});

  // Month prev/next arrows
  document.getElementById('nav-prev').addEventListener('click',()=>{
    if(S.calMonth===0){S.calMonth=11;S.calYear--;}else{S.calMonth--;}
    renderCalendar('left');
  });
  document.getElementById('nav-next').addEventListener('click',()=>{
    if(S.calMonth===11){S.calMonth=0;S.calYear++;}else{S.calMonth++;}
    renderCalendar('right');
  });

  // Day panel
  document.getElementById('close-panel').addEventListener('click',()=>{
    const p=document.getElementById('day-panel');
    p.classList.remove('open','expanded');
    S.selectedDate=null;renderCalendar();
  });
  document.getElementById('expand-panel').addEventListener('click',()=>{
    const p=document.getElementById('day-panel');
    const isExpanded=p.classList.contains('expanded');
    p.classList.toggle('expanded',!isExpanded);
    p.classList.toggle('open',isExpanded);
    document.getElementById('expand-panel').querySelector('.ms').textContent=isExpanded?'expand_less':'expand_more';
  });
  // Sheet handle: tap to toggle expand
  document.getElementById('sheet-handle').addEventListener('click',()=>{
    const p=document.getElementById('day-panel');
    p.classList.toggle('expanded');
    const isExp=p.classList.contains('expanded');
    document.getElementById('expand-panel').querySelector('.ms').textContent=isExp?'expand_more':'expand_less';
  });

  // Create buttons
  document.getElementById('dp-new-folder').addEventListener('click',()=>openFolderModal());
  document.getElementById('dp-new-note').addEventListener('click',()=>{if(!S.selectedDate){toast('Select a day first');return}openNoteEditor()});
  document.getElementById('dp-new-todo').addEventListener('click',()=>{if(!S.selectedDate){toast('Select a day first');return}openTodoEditor()});
  document.getElementById('dp-new-table').addEventListener('click',()=>{if(!S.selectedDate){toast('Select a day first');return}openTableEditor()});

  // Swipe down on day panel to close
  let touchStartY=0;
  const panel=document.getElementById('day-panel');
  panel.addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY;},{passive:true});
  panel.addEventListener('touchend',e=>{
    const dy=e.changedTouches[0].clientY-touchStartY;
    if(dy>60){
      if(panel.classList.contains('expanded')){
        panel.classList.remove('expanded');
        document.getElementById('expand-panel').querySelector('.ms').textContent='expand_less';
      }else{
        panel.classList.remove('open');S.selectedDate=null;renderCalendar();
      }
    }
  },{passive:true});
}

/* ═══════════════════════════════════════════════
   LOGO CIRCLE POSITIONING
═══════════════════════════════════════════════ */
function positionCircles(){
  const O=document.getElementById('ls-O'),a=document.getElementById('ls-a');
  const Of=document.getElementById('ls-Of'),af=document.getElementById('ls-af');
  if(!O||!Of)return;
  try{
    const ob=O.getBBox();
    Of.setAttribute('cx',ob.x+ob.width/2);Of.setAttribute('cy',ob.y+ob.height/2);Of.setAttribute('r',Math.min(ob.width,ob.height)*0.45);
    const ab=a.getBBox();
    af.setAttribute('cx',ab.x+ab.width/2);af.setAttribute('cy',ab.y+ab.height/2+1);af.setAttribute('r',Math.min(ab.width,ab.height)*0.4);
  }catch(e){}
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
function init(){
  loadS();
  applySettings();
  document.fonts.ready.then(positionCircles);
  window.addEventListener('resize',positionCircles);
  setupEvents();
  renderCalendar();
}
init();
</script>

<!-- PWA Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => {
        console.log('[NOTECal] SW registered:', reg.scope);
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              /* New version available — silent update */
              newWorker.postMessage('SKIP_WAITING');
            }
          });
        });
      })
      .catch(err => console.warn('[NOTECal] SW registration failed:', err));
  });

  /* Reload when new SW takes control */
  let refreshing = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!refreshing) { refreshing = true; window.location.reload(); }
  });
}
</script>
