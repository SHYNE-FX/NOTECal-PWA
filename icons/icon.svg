<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6ef2"/>
      <stop offset="100%" stop-color="#5a50d4"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d4d0ff" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <!-- Scroll icon (centered, ~300px, stroke style matching Image 5) -->
  <!-- Scaled from 24-unit viewbox to ~300px: factor = 300/24 = 12.5, offset to center: (512-300)/2 = 106 -->
  <g transform="translate(106,106) scale(12.5)" fill="none" stroke="url(#iconGrad)" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bottom tab (scroll roll) -->
    <path d="M8 21h12a2 2 0 0 0 0-4H8v4z"/>
    <!-- Main body -->
    <path d="M19 17V5a2 2 0 0 0-2-2H7"/>
    <!-- Top-left circle peg -->
    <path d="M7 3a2 2 0 0 0 0 4h.5"/>
    <!-- Left edge line -->
    <path d="M7 7v10"/>
  </g>
</svg>
